<!doctype html>
<html lang="es">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<meta name="theme-color" content="#0A4A3E">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>Flag Mazatlán</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Anton&family=Manrope:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
:root{
  --green:#0A4A3E;--green2:#0E6354;--teal:#2EC4C0;--wave:#2D8FD8;
  --sand:#FBF3E1;--sand2:#EFE3C6;--ink:#0D2622;--ink2:#557067;
  --gold:#FFC93C;--coral:#FF9645;--white:#FFFFFF;--danger:#C2402F;
  --r:18px;--r2:12px;--sh:0 3px 14px -8px rgba(13,38,34,.18);
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
html,body{margin:0;padding:0;}
body{background:radial-gradient(130% 90% at 50% -12%,#1a6358 0%,#0a3530 45%,#051815 100%);font-family:'Manrope',system-ui,sans-serif;color:var(--ink);min-height:100vh;-webkit-font-smoothing:antialiased;}
.app{max-width:480px;margin:0 auto;min-height:100vh;background:var(--sand);display:flex;flex-direction:column;}
@media(min-width:520px){body{padding:24px 12px;}.app{border-radius:28px;overflow:hidden;box-shadow:0 24px 60px -20px rgba(0,0,0,.5);min-height:auto;}}
a,button{cursor:pointer;}
button{font-family:inherit;border:none;background:none;color:inherit;}
input,select,textarea{font-family:inherit;}
::-webkit-scrollbar{width:0;height:0;}

/* BRAND STRIP */
.strip{height:4px;background:linear-gradient(90deg,var(--teal),#4FBF8F,#8AC36B,var(--gold),#FFA93C,var(--coral));flex-shrink:0;}

/* TOPBAR */
.topbar{position:sticky;top:0;z-index:30;background:linear-gradient(120deg,var(--green),#083F35);color:var(--sand);padding:12px 14px;display:flex;align-items:center;gap:10px;border-bottom:1px solid rgba(255,255,255,.12);}
.tb-logo{width:34px;height:34px;border-radius:10px;overflow:hidden;flex-shrink:0;border:1px solid rgba(255,255,255,.18);}
.tb-logo img{width:100%;height:100%;object-fit:cover;display:block;}
.tb-btn{width:34px;height:34px;border-radius:50%;display:flex;align-items:center;justify-content:center;background:rgba(255,255,255,.08);flex-shrink:0;}
.tb-title{flex:1;min-width:0;font-family:'Anton';font-size:17px;text-transform:uppercase;letter-spacing:.03em;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.tb-sub{display:block;font-family:'Manrope';font-size:10px;color:var(--gold);font-weight:700;text-transform:none;letter-spacing:.02em;}
.tb-admin.on .tb-btn{background:var(--gold);color:var(--green);}

/* CONTENT */
.content{flex:1;padding:14px 14px 90px;}
.section-title{font-family:'Anton';font-size:20px;text-transform:uppercase;letter-spacing:.01em;margin:4px 0 10px;color:var(--ink);}
.eyebrow{font-size:10.5px;font-weight:800;letter-spacing:.12em;text-transform:uppercase;color:var(--ink2);margin:0 0 4px;}
.row-between{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px;}
.row-between .section-title{margin:0;}
.blurb{font-size:13px;line-height:1.6;color:var(--ink2);margin-bottom:16px;}
.empty{text-align:center;padding:40px 14px;color:var(--ink2);}
.empty svg{opacity:.3;margin-bottom:10px;}
.empty p{font-size:13px;margin:0;line-height:1.5;}

/* HERO */
.hero{border-radius:18px;color:var(--sand);position:relative;overflow:hidden;margin:0 4px 14px;background:#071E18;}
.hero-bg{position:absolute;inset:0;background:linear-gradient(135deg,#0E5C4A,#083D30 45%,#071E18);z-index:0;}
.hero-lines{position:absolute;inset:0;z-index:1;overflow:hidden;opacity:.055;pointer-events:none;}
.hero-lines::before{content:'';position:absolute;top:-60px;left:-40px;right:-40px;bottom:-60px;background:repeating-linear-gradient(-55deg,white 0,white 1px,transparent 1px,transparent 30px);}
.hero-blob{position:absolute;right:-40px;top:-20px;width:180px;height:180px;border-radius:50%;background:radial-gradient(circle,rgba(255,201,60,.14),transparent 65%);z-index:1;filter:blur(6px);}
.hero-glow{position:absolute;left:-40px;bottom:0;width:160px;height:160px;border-radius:50%;background:radial-gradient(circle,rgba(46,196,192,.13),transparent 65%);z-index:1;filter:blur(8px);}
.hero-accent{position:absolute;left:0;top:0;bottom:0;width:4px;z-index:3;background:linear-gradient(180deg,var(--gold),var(--coral),var(--teal));}
.hero-body{position:relative;z-index:2;padding:14px 16px 14px 20px;display:flex;align-items:center;gap:12px;}
.hero-logo-col{display:flex;flex-direction:column;align-items:center;flex-shrink:0;}
.hero-logo-ring{width:66px;height:66px;border-radius:16px;padding:3px;background:linear-gradient(135deg,rgba(255,201,60,.55),rgba(46,196,192,.25));box-shadow:0 0 0 1px rgba(255,201,60,.25),0 10px 24px -8px rgba(0,0,0,.7);display:flex;align-items:center;justify-content:center;}
.hero-logo-ring img{width:100%;height:100%;border-radius:13px;object-fit:cover;display:block;}
.hero-badge{margin-top:6px;background:linear-gradient(90deg,var(--gold),var(--coral));color:var(--ink);font-family:'Anton';font-size:8px;letter-spacing:.1em;text-transform:uppercase;padding:3px 9px;border-radius:20px;white-space:nowrap;box-shadow:0 3px 8px rgba(255,140,50,.4);}
.hero-info{flex:1;min-width:0;display:flex;flex-direction:column;}
.hn-top{font-size:8.5px;font-weight:800;letter-spacing:.18em;text-transform:uppercase;color:rgba(180,230,215,.5);display:block;margin-bottom:2px;}
.hn-main{font-family:'Anton';font-size:22px;letter-spacing:.04em;text-transform:uppercase;line-height:.95;color:#fff;display:block;}
.hn-sub{font-family:'Anton';font-size:12px;letter-spacing:.14em;text-transform:uppercase;color:var(--gold);display:block;margin-top:3px;}
.hero-sep{height:1px;margin:7px 0 6px;background:linear-gradient(90deg,rgba(255,201,60,.5),rgba(255,255,255,.1),transparent);}
.hero-cd-label{font-size:8px;font-weight:800;letter-spacing:.1em;text-transform:uppercase;color:rgba(170,215,200,.55);margin-bottom:6px;}
.hero-cd-row{display:flex;align-items:stretch;gap:4px;width:100%;}
.hcd-box{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.12);border-radius:10px;padding:7px 4px;backdrop-filter:blur(6px);}
.hcd-box b{font-family:'Anton';font-size:20px;color:var(--gold);line-height:1;text-shadow:0 0 16px rgba(255,201,60,.55);}
.hcd-box span{font-size:7px;text-transform:uppercase;letter-spacing:.1em;color:rgba(170,220,205,.7);margin-top:3px;font-weight:800;}
.hcd-sep{font-family:'Anton';font-size:16px;color:rgba(255,201,60,.4);display:flex;align-items:center;padding-bottom:8px;flex-shrink:0;}
.hero-started{font-family:'Anton';font-size:13px;color:var(--gold);letter-spacing:.05em;text-transform:uppercase;}
.hero-social-row{display:flex;align-items:center;gap:5px;flex-wrap:wrap;margin-top:0;}
.social-btn{display:inline-flex;align-items:center;gap:4px;background:rgba(255,255,255,.09);border:1px solid rgba(255,255,255,.14);border-radius:20px;padding:4px 9px;font-size:9px;font-weight:800;color:rgba(220,240,235,.9);text-decoration:none;flex-shrink:0;}
.social-fb{background:rgba(24,119,242,.18);border-color:rgba(24,119,242,.3);}
.inscribe-btn{display:inline-flex;align-items:center;gap:4px;background:linear-gradient(90deg,var(--gold),var(--coral));border-radius:20px;padding:4px 10px;font-size:9px;font-weight:800;color:var(--ink);text-decoration:none;box-shadow:0 3px 10px rgba(255,150,50,.4);flex-shrink:0;}

/* SEARCH */
.search-box{display:flex;align-items:center;gap:9px;background:var(--white);border:1.5px solid var(--sand2);border-radius:14px;padding:11px 13px;margin-bottom:14px;box-shadow:var(--sh);}
.search-box input{flex:1;border:none;outline:none;background:transparent;font-size:14px;color:var(--ink);}

/* CAT CARD */
.cat-card{display:flex;align-items:center;gap:12px;background:var(--white);border-radius:var(--r2);padding:12px 13px;margin-bottom:8px;border:1px solid var(--sand2);box-shadow:var(--sh);position:relative;}
.cat-band{width:5px;align-self:stretch;border-radius:5px;flex-shrink:0;}
.cat-info{flex:1;min-width:0;}
.cat-info h3{margin:0 0 2px;font-size:14.5px;font-weight:800;color:var(--ink);}
.cat-info span{font-size:11.5px;color:var(--ink2);}
.chevron{opacity:.35;flex-shrink:0;}

/* TEAM GRID */
.grid-2{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
.team-card{background:var(--white);border-radius:var(--r2);border:1px solid var(--sand2);overflow:hidden;box-shadow:var(--sh);}
.team-cover{height:70px;display:flex;align-items:center;justify-content:center;font-family:'Anton';font-size:20px;color:rgba(255,255,255,.92);background-size:cover;background-position:center;}
.team-body{padding:9px 10px 11px;}
.team-body h4{margin:0 0 2px;font-size:12.5px;font-weight:800;color:var(--ink);}
.team-body .meta{font-size:10px;color:var(--ink2);}
.record{display:inline-block;margin-top:5px;font-size:10px;font-weight:800;background:linear-gradient(90deg,var(--green),var(--green2));color:var(--gold);padding:3px 8px;border-radius:20px;}
.add-card{border:2px dashed var(--sand2);border-radius:var(--r2);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:6px;min-height:130px;color:var(--ink2);font-size:12px;font-weight:700;background:rgba(255,255,255,.5);}

/* BANNER */
.banner{border-radius:20px;overflow:hidden;position:relative;margin-bottom:12px;min-height:150px;display:flex;align-items:flex-end;background-size:cover;background-position:center;box-shadow:0 12px 32px -12px rgba(0,0,0,.4);}
.banner::before{content:'';position:absolute;inset:0;background:linear-gradient(0deg,rgba(8,35,30,.78) 0%,rgba(8,35,30,.15) 55%,transparent 100%);}
.banner-content{position:relative;z-index:1;padding:16px;color:var(--white);width:100%;}
.banner-tag{display:inline-block;font-size:10px;font-weight:800;letter-spacing:.1em;text-transform:uppercase;background:rgba(255,255,255,.16);padding:3px 9px;border-radius:20px;margin-bottom:7px;backdrop-filter:blur(3px);border:1px solid rgba(255,255,255,.2);}
.banner h2{font-family:'Anton';font-size:25px;margin:0 0 2px;text-transform:uppercase;letter-spacing:.01em;}
.banner small{font-size:11.5px;opacity:.82;}

/* INFO BOXES */
.info-row{display:flex;gap:9px;margin-bottom:14px;}
.info-box{flex:1;background:var(--white);border:1px solid var(--sand2);border-radius:var(--r2);padding:10px 8px;text-align:center;box-shadow:var(--sh);}
.info-box b{display:block;font-family:'Anton';font-size:19px;color:var(--green);}
.info-box span{font-size:9.5px;text-transform:uppercase;letter-spacing:.06em;color:var(--ink2);}

/* ROSTER */
.roster-row{display:flex;align-items:center;gap:11px;background:var(--white);border:1px solid var(--sand2);border-radius:13px;padding:9px 11px;margin-bottom:6px;box-shadow:var(--sh);}
.jersey{width:38px;height:38px;border-radius:10px;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-family:'Anton';font-size:14px;color:var(--white);background-size:cover;background-position:center;}
.roster-info{flex:1;min-width:0;}
.roster-info h4{margin:0 0 1px;font-size:13px;font-weight:800;color:var(--ink);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.roster-info span{font-size:11px;color:var(--ink2);}
.add-row{border:2px dashed var(--sand2);border-radius:13px;display:flex;align-items:center;justify-content:center;gap:6px;padding:12px;color:var(--ink2);font-size:12px;font-weight:700;}

/* PLAYER */
.player-hero{display:flex;gap:13px;align-items:center;margin-bottom:14px;}
.player-photo{width:84px;height:84px;border-radius:20px;flex-shrink:0;background-size:cover;background-position:center;display:flex;align-items:center;justify-content:center;font-family:'Anton';font-size:28px;color:var(--white);box-shadow:0 10px 28px -8px rgba(10,74,62,.5);}
.player-name{font-family:'Anton';font-size:21px;text-transform:uppercase;line-height:1.04;margin:0 0 4px;color:var(--ink);}
.team-link{font-size:11.5px;color:var(--ink2);display:block;margin-top:4px;}
.team-link b{color:var(--ink);}
.stat-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:16px;}
.stat-box{background:linear-gradient(140deg,var(--green),var(--green2));color:var(--sand);border-radius:var(--r2);padding:13px 8px;text-align:center;box-shadow:0 6px 16px -6px rgba(10,74,62,.4);}
.stat-box b{display:block;font-family:'Anton';font-size:24px;color:var(--gold);line-height:1;}
.stat-box span{font-size:9px;text-transform:uppercase;letter-spacing:.07em;color:rgba(210,240,234,.85);display:block;margin-top:4px;}

/* RANKINGS */
.tabs{display:flex;background:var(--white);border:1px solid var(--sand2);border-radius:14px;padding:4px;margin-bottom:12px;box-shadow:var(--sh);}
.tab-btn{flex:1;text-align:center;padding:9px 4px;border-radius:10px;font-size:12px;font-weight:800;color:var(--ink2);}
.tab-btn.on{background:linear-gradient(120deg,var(--green),var(--green2));color:var(--gold);}
.chip-row{display:flex;gap:7px;overflow-x:auto;padding-bottom:3px;margin-bottom:10px;}
.chip-row::-webkit-scrollbar{height:0;}
.chip{flex-shrink:0;padding:7px 13px;border-radius:30px;background:var(--white);border:1.5px solid var(--sand2);font-size:11.5px;font-weight:800;color:var(--ink2);white-space:nowrap;box-shadow:var(--sh);}
.chip.on{background:linear-gradient(120deg,var(--green),var(--teal));color:var(--white);border-color:transparent;}
.select-field{width:100%;border:1.5px solid var(--sand2);border-radius:13px;padding:10px 12px;font-size:13px;background:var(--white);color:var(--ink);margin-bottom:12px;box-shadow:var(--sh);}
.rank-row{display:flex;align-items:center;gap:11px;background:var(--white);border:1px solid var(--sand2);border-radius:13px;padding:10px 12px;margin-bottom:7px;box-shadow:var(--sh);}
.rank-num{width:28px;height:28px;border-radius:8px;background:var(--sand2);display:flex;align-items:center;justify-content:center;font-family:'Anton';font-size:13px;flex-shrink:0;color:var(--ink);}
.rank-num.r1{background:var(--gold);color:var(--green);}
.rank-num.r2{background:#DDD9CF;}
.rank-num.r3{background:#E8C99C;}
.rank-info{flex:1;min-width:0;}
.rank-info h4{margin:0 0 2px;font-size:13px;font-weight:800;color:var(--ink);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.rank-info span{font-size:11px;color:var(--ink2);}
.rank-val{font-family:'Anton';font-size:19px;color:var(--green);flex-shrink:0;text-align:right;}
.rank-val small{display:block;font-family:'Manrope';font-size:8.5px;text-transform:uppercase;color:var(--ink2);font-weight:700;letter-spacing:.04em;}

/* CHAMPIONS */
.champ-season-hdr{font-family:'Anton';font-size:14px;letter-spacing:.04em;text-transform:uppercase;color:var(--ink);margin:16px 0 8px;display:flex;align-items:center;gap:6px;}
.champ-season-hdr:first-child{margin-top:0;}
.champ-grid{display:grid;grid-template-columns:1fr 1fr;gap:9px;margin-bottom:2px;}
.champ-card{background:var(--white);border:1px solid var(--sand2);border-radius:14px;overflow:hidden;box-shadow:var(--sh);position:relative;}
.champ-photo{height:112px;background-size:cover;background-position:center top;cursor:zoom-in;position:relative;}
.champ-photo::after{content:'🔍';position:absolute;bottom:5px;right:5px;font-size:12px;background:rgba(0,0,0,.45);border-radius:20px;padding:2px 5px;}
.champ-body{padding:8px 9px 9px;}
.champ-cat{font-size:9px;font-weight:800;text-transform:uppercase;letter-spacing:.08em;color:var(--teal);margin-bottom:2px;}
.champ-name{font-size:13px;font-weight:800;color:var(--ink);display:flex;align-items:center;gap:4px;margin-bottom:2px;}
.champ-season-label{font-size:10px;color:var(--ink2);}

/* BOTTOM NAV */
.bottomnav{position:sticky;bottom:0;z-index:30;display:flex;background:rgba(255,251,245,.97);border-top:1px solid var(--sand2);padding:7px 2px calc(7px + env(safe-area-inset-bottom));backdrop-filter:blur(12px);}
.nav-btn{flex:1;display:flex;flex-direction:column;align-items:center;gap:2px;padding:5px 0;border-radius:10px;color:var(--ink2);}
.nav-btn svg{width:19px;height:19px;flex-shrink:0;}
.nav-btn.on{color:var(--green);}
.nav-btn.on svg{stroke:var(--green);}
.nav-btn span{font-size:8px;font-weight:700;letter-spacing:.01em;text-align:center;}

/* TABLA DE POSICIONES */
.standings-cat-hdr{font-family:'Anton';font-size:13px;letter-spacing:.04em;text-transform:uppercase;color:var(--ink);margin:16px 0 7px;display:flex;align-items:center;gap:7px;}
.standings-cat-hdr:first-child{margin-top:0;}
.standings-dot{width:9px;height:9px;border-radius:3px;flex-shrink:0;display:inline-block;}
.standings-wrap{background:var(--white);border:1px solid var(--sand2);border-radius:16px;overflow:hidden;box-shadow:var(--sh);margin-bottom:16px;}
.standings-tbl{width:100%;border-collapse:collapse;font-size:12px;}
.standings-tbl thead tr{background:var(--green);color:var(--gold);}
.standings-tbl thead th{padding:9px 4px;text-align:center;font-size:10px;font-weight:800;letter-spacing:.06em;text-transform:uppercase;}
.stand-team-hdr{text-align:left !important;padding-left:10px !important;}
.stand-row{border-bottom:1px solid var(--sand2);cursor:pointer;transition:background .1s;}
.stand-row:last-child{border-bottom:none;}
.stand-row:active{background:var(--sand);}
.stand-top{background:linear-gradient(90deg,rgba(255,201,60,.08),transparent);}
.stand-pos{width:28px;text-align:center;font-family:'Anton';font-size:13px;color:var(--ink);padding:10px 4px;}
.stand-team{padding:8px 4px 8px 10px;display:flex;align-items:center;gap:0;min-width:0;flex:1;}
.stand-team img,.stand-dot{margin-right:6px;flex-shrink:0;}
.stand-dot{width:10px;height:10px;border-radius:3px;display:inline-block;}
.stand-team span{font-size:11.5px;font-weight:800;color:var(--ink);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:90px;}
.stand-num{text-align:center;padding:10px 4px;font-size:12px;font-weight:700;color:var(--ink2);width:32px;}
.stand-g{color:var(--green) !important;font-weight:800 !important;}
.stand-p{color:var(--danger) !important;}
.stand-dif{font-weight:800 !important;}
.stand-pos-dif{color:var(--green) !important;}
.stand-neg-dif{color:var(--danger) !important;}
.cal-info-bar{display:flex;flex-direction:column;gap:6px;background:var(--white);border:1px solid var(--sand2);border-radius:var(--r2);padding:11px 13px;margin-bottom:12px;box-shadow:var(--sh);}
.cal-info-item{display:flex;align-items:center;gap:8px;font-size:12px;font-weight:700;color:var(--ink);}
.cal-info-item svg{flex-shrink:0;color:var(--teal);}
.cal-date-hdr{font-size:11px;font-weight:800;letter-spacing:.06em;text-transform:uppercase;color:var(--ink2);margin:14px 0 7px;padding-left:2px;}
.cal-date-hdr:first-child{margin-top:0;}
.match-card{background:var(--white);border:1px solid var(--sand2);border-radius:14px;padding:11px 13px;margin-bottom:8px;box-shadow:var(--sh);position:relative;}
.match-cat{font-size:9.5px;font-weight:800;text-transform:uppercase;letter-spacing:.08em;color:var(--teal);margin-bottom:8px;}
.match-teams{display:flex;align-items:center;justify-content:space-between;gap:8px;margin-bottom:6px;}
.match-team{flex:1;font-size:13px;font-weight:800;color:var(--ink);text-align:center;line-height:1.2;}
.match-team:first-child{text-align:right;}
.match-team:last-child{text-align:left;}
.mt-winner{color:var(--green);}
.match-vs{font-family:'Anton';font-size:16px;color:var(--ink2);flex-shrink:0;padding:0 4px;}
.match-score{display:flex;align-items:center;gap:4px;flex-shrink:0;}
.ms-val{font-family:'Anton';font-size:20px;color:var(--ink2);min-width:28px;text-align:center;}
.ms-val.ms-win{color:var(--green);}
.ms-sep{font-family:'Anton';font-size:16px;color:var(--ink2);}
.match-field{font-size:10.5px;color:var(--ink2);margin-top:4px;}
.cal-empty{text-align:center;padding:32px 14px;}
.cal-empty-icon{font-size:40px;margin-bottom:10px;}
.cal-empty-title{font-family:'Anton';font-size:18px;text-transform:uppercase;color:var(--ink);margin-bottom:8px;}
.cal-empty-sub{font-size:12.5px;color:var(--ink2);line-height:1.6;}

/* ADMIN */
.admin-bar{background:linear-gradient(120deg,var(--gold),#FFD97A);color:var(--green);border-radius:12px;padding:9px 12px;margin-bottom:14px;display:flex;align-items:center;gap:9px;font-size:11.5px;font-weight:700;box-shadow:0 4px 14px -6px rgba(255,180,30,.5);}
.admin-bar button{margin-left:auto;text-decoration:underline;font-size:11.5px;}
.pencil-btn{width:30px;height:30px;border-radius:50%;background:var(--white);border:1px solid var(--sand2);display:flex;align-items:center;justify-content:center;flex-shrink:0;box-shadow:var(--sh);}

/* MODAL */
.modal-root{position:fixed;inset:0;z-index:100;display:none;}
.modal-root.open{display:block;}
.modal-backdrop{position:absolute;inset:0;background:rgba(5,22,18,.65);display:flex;align-items:flex-end;justify-content:center;backdrop-filter:blur(3px);}
@media(min-width:520px){.modal-backdrop{align-items:center;}}
.modal-card{background:var(--sand);width:100%;max-width:480px;max-height:88vh;overflow:auto;border-radius:24px 24px 0 0;padding:20px 16px calc(20px + env(safe-area-inset-bottom));animation:slideUp .2s cubic-bezier(.34,1.26,.64,1);}
@media(min-width:520px){.modal-card{border-radius:20px;}}
@keyframes slideUp{from{transform:translateY(24px);opacity:0;}to{transform:translateY(0);opacity:1;}}
.modal-card h3{font-family:'Anton';font-size:18px;text-transform:uppercase;margin:0 0 14px;color:var(--ink);}
.field{margin-bottom:11px;}
.field label{display:block;font-size:10px;font-weight:800;text-transform:uppercase;letter-spacing:.07em;color:var(--ink2);margin-bottom:4px;}
.field input,.field select,.field textarea{width:100%;border:1.5px solid var(--sand2);border-radius:11px;padding:10px 12px;font-size:13.5px;color:var(--ink);background:var(--white);outline:none;transition:border-color .15s;}
.field input:focus,.field select:focus,.field textarea:focus{border-color:var(--teal);}
.field textarea{resize:vertical;min-height:64px;}
.field-hint{font-size:10.5px;color:var(--ink2);margin-top:3px;}
.field-row{display:flex;gap:9px;}
.field-row .field{flex:1;}
.stat-fields{display:grid;grid-template-columns:1fr 1fr 1fr;gap:9px;}
.modal-actions{display:flex;gap:9px;margin-top:16px;}
.btn{flex:1;padding:12px;border-radius:12px;font-weight:800;font-size:12.5px;text-align:center;text-transform:uppercase;letter-spacing:.04em;}
.btn-p{background:linear-gradient(120deg,var(--green),var(--green2));color:var(--gold);box-shadow:0 6px 18px -6px rgba(10,74,62,.55);}
.btn-s{background:var(--sand2);color:var(--ink);}
.btn-d{background:transparent;color:var(--danger);flex:none;text-decoration:underline;text-transform:none;font-weight:700;letter-spacing:0;}

/* LIGHTBOX */
.lightbox{position:fixed;inset:0;z-index:500;background:rgba(0,0,0,.92);display:none;align-items:center;justify-content:center;padding:18px;}
.lightbox.open{display:flex;}
.lightbox img{max-width:100%;max-height:88vh;border-radius:14px;object-fit:contain;animation:lbIn .2s ease;}
@keyframes lbIn{from{transform:scale(.92);opacity:0;}to{transform:scale(1);opacity:1;}}
.lb-close{position:absolute;top:14px;right:14px;width:38px;height:38px;border-radius:50%;background:rgba(255,255,255,.12);border:1px solid rgba(255,255,255,.2);color:#fff;font-size:20px;display:flex;align-items:center;justify-content:center;cursor:pointer;}

/* TOAST */
.toast{position:fixed;left:50%;bottom:88px;transform:translateX(-50%) translateY(20px);background:var(--ink);color:var(--gold);padding:10px 18px;border-radius:30px;font-size:12.5px;font-weight:800;opacity:0;pointer-events:none;transition:all .25s cubic-bezier(.34,1.26,.64,1);z-index:200;white-space:nowrap;box-shadow:0 10px 28px -8px rgba(0,0,0,.5);}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0);}

/* LOADING */
.loading{min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:14px;background:linear-gradient(160deg,#084E40,#0A3530 50%,#071D1A);}
.loading img{width:68px;height:68px;border-radius:18px;object-fit:cover;box-shadow:0 12px 32px -10px rgba(0,0,0,.6);}
.spinner{width:32px;height:32px;border-radius:50%;border:3px solid rgba(255,255,255,.15);border-top-color:var(--gold);animation:spin .8s linear infinite;}
@keyframes spin{to{transform:rotate(360deg);}}
.loading b{font-family:'Anton';letter-spacing:.08em;text-transform:uppercase;font-size:13px;color:rgba(220,240,235,.7);}
</style>
</head>

/* ── HELPERS ── */
function esc(s){return String(s==null?'':s).replace(/[&<>"']/g,function(c){return{'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c];});}
function uid(){return Date.now().toString(36)+Math.random().toString(36).slice(2,7);}
function slug(s){return String(s).toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g,'').replace(/[^a-z0-9]+/g,'-').replace(/(^-|-$)/g,'');}
function initials(n){var p=String(n).trim().split(/\s+/);return((p[0]||'')[0]||'')+((p[1]||'')[0]||'');}

function lc(stops,t){
  t=Math.max(0,Math.min(1,t));
  var n=stops.length-1,seg=t*n,i=Math.min(n-1,Math.floor(seg)),lt=seg-i;
  function hr(h){h=h.replace('#','');if(h.length===3)h=h.split('').map(function(c){return c+c;}).join('');var n=parseInt(h,16);return[(n>>16)&255,(n>>8)&255,n&255];}
  function rh(rgb){return '#'+rgb.map(function(v){v=Math.max(0,Math.min(255,Math.round(v)));var h=v.toString(16);return h.length===1?'0'+h:h;}).join('');}
  var a=hr(stops[i]),b=hr(stops[i+1]);
  return rh([a[0]+(b[0]-a[0])*lt,a[1]+(b[1]-a[1])*lt,a[2]+(b[2]-a[2])*lt]);
}

/* ── INDEX ── */
function rebuildIndex(){
  IDX={teams:{},players:{},search:[]};
  DATA.categories.forEach(function(cat){
    cat.teams.forEach(function(team){
      IDX.teams[team.id]={team:team,cat:cat};
      IDX.search.push({type:'team',id:team.id,name:team.name,sub:cat.name});
      team.players.forEach(function(p){
        IDX.players[p.id]={player:p,team:team,cat:cat};
        IDX.search.push({type:'player',id:p.id,name:p.name,sub:team.name+' · #'+p.number});
      });
    });
  });
}

/* ── STORAGE ── */
async function loadData(){
  try{
    var r=await window.storage.get(STORAGE_KEY,true);
    if(r&&r.value){var p=JSON.parse(r.value);if(p&&p.categories&&p.categories.length){if(!p.champions)p.champions=[];if(!p.schedule)p.schedule={jornadas:[]};return p;}}
  }catch(e){}
  var f=generateLeague();
  try{await window.storage.set(STORAGE_KEY,JSON.stringify(f),true);}catch(e){}
  return f;
}
async function persist(){
  DATA.updatedAt=Date.now();rebuildIndex();
  try{await window.storage.set(STORAGE_KEY,JSON.stringify(DATA),true);}catch(e){toast('No se pudo guardar');}
}

  var el=document.getElementById('toast');

}

/* ── RENDER ── */
function render(){
  var parts=route();
  var root=document.getElementById('app');
  var html='';
  if(!parts.length){html=renderHome();}
  else if(parts[0]==='categorias'){html=renderCats();}
  else if(parts[0]==='categoria'&&parts[1]){html=renderCat(parts[1]);}
  else if(parts[0]==='equipo'&&parts[1]){html=renderTeam(parts[1]);}
  else if(parts[0]==='jugador'&&parts[1]){html=renderPlayer(parts[1]);}
  else if(parts[0]==='buscar'){html=renderSearch();}
  else if(parts[0]==='rankings'){html=renderRankings();}
  else if(parts[0]==='campeones'){html=renderChampions();}
  else if(parts[0]==='calendario'){html=renderCalendar();}
  else{html=renderHome();}
  root.innerHTML='<div class="strip"></div>'+html;
  afterRender(parts);
}

function buildJornadaHtml(sched, jornada, catFilter){
  var isPlayoff = jornada === 8;
  var label = isPlayoff ? 'Playoffs' : 'Jornada '+jornada;
  var matches = (sched.jornadas||[]).filter(function(m){
    return m.jornada===jornada && (catFilter==='all'||m.catId===catFilter);
  });

  if(!matches.length){
    return '<div class="cal-empty">'+
      '<div class="cal-empty-icon">'+(isPlayoff?'🏆':'🏈')+'</div>'+
      '<div class="cal-empty-title">'+label+'</div>'+
      '<div class="cal-empty-sub">'+(isPlayoff?'Los playoffs se definirán al concluir las 7 jornadas de la temporada regular.':'Los duelos de esta jornada están por confirmarse.<br>Pendiente de programación oficial.')+'</div>'+
    '</div>';
  }

  /* Agrupar por fecha */
  var byDate={};
  matches.forEach(function(m){
    var k=m.date||'Sin fecha';
    if(!byDate[k])byDate[k]=[];
    byDate[k].push(m);
  });

  var html='';
  Object.keys(byDate).sort().forEach(function(date){
    var dayLabel=date==='Sin fecha'?'Fecha por confirmar':fmtDate(date);
    html+='<div class="cal-date-hdr">📅 '+dayLabel+'</div>';
    byDate[date].forEach(function(m){
      html+=matchCardHtml(m);
    });
  });
  return html;
}

function matchCardHtml(m){
  var cat=DATA.categories.find(function(c){return c.id===m.catId;});
  var catName=cat?cat.name:'';
  var scoreHtml='';
  if(m.played){
    scoreHtml='<div class="match-score">'+
      '<span class="ms-val'+(m.homeScore>m.awayScore?' ms-win':'')+'">'+m.homeScore+'</span>'+
      '<span class="ms-sep">-</span>'+
      '<span class="ms-val'+(m.awayScore>m.homeScore?' ms-win':'')+'">'+m.awayScore+'</span>'+
    '</div>';
  }else{
    scoreHtml='<div class="match-vs">VS</div>';
  }
  var editBtn=ADMIN?'<button class="pencil-btn" style="position:absolute;top:8px;right:8px" data-action="edit-match" data-id="'+m.id+'">'+IC.pencil+'</button>':'';
  return '<div class="match-card">'+editBtn+
    '<div class="match-cat">'+esc(catName)+(m.time?' · '+esc(m.time):'')+'</div>'+
    '<div class="match-teams">'+
      '<div class="match-team'+(m.played&&m.homeScore>m.awayScore?' mt-winner':'')+'">'+esc(m.home)+'</div>'+
      scoreHtml+
      '<div class="match-team'+(m.played&&m.awayScore>m.homeScore?' mt-winner':'')+'">'+esc(m.away)+'</div>'+
    '</div>'+
    (m.field?'<div class="match-field">🏟 '+esc(m.field)+'</div>':'')+
  '</div>';
}

function fmtDate(d){
  try{
    var parts=d.split('-');
    var dt=new Date(parseInt(parts[0]),parseInt(parts[1])-1,parseInt(parts[2]));
    return dt.toLocaleDateString('es-MX',{weekday:'long',day:'numeric',month:'long'});
  }catch(e){return d;}
}

function buildRankHtml(){
  if(rankState.tab==='players'){
    var sd=STAT_DEFS.filter(function(s){return s.key===rankState.stat;})[0]||STAT_DEFS[0];
    var list=Object.keys(IDX.players).map(function(k){return IDX.players[k];});
    if(rankState.catFilter!=='all')list=list.filter(function(x){return x.cat.id===rankState.catFilter;});
    list.sort(function(a,b){return b.player.stats[sd.key]-a.player.stats[sd.key];});
    list=list.slice(0,25);
    if(!list.length)return emptyHtml();
    return list.map(function(x,i){
      var rc=i===0?'r1':i===1?'r2':i===2?'r3':'';
      return'<a class="rank-row" data-route="#/jugador/'+x.player.id+'">'+
        '<div class="rank-num '+rc+'">'+(i+1)+'</div>'+
        '<div class="rank-info"><h4>'+esc(x.player.name)+'</h4><span>'+esc(x.team.name)+' · '+esc(x.cat.name)+'</span></div>'+
        '<div class="rank-val">'+x.player.stats[sd.key]+'<small>'+sd.short+'</small></div></a>';
    }).join('');
  }

  /* ── TABLA DE POSICIONES ── */
  /* Si hay filtro de categoría mostramos esa tabla; si es "all" mostramos por categoría */
  if(rankState.catFilter!=='all'){
    return buildStandingsTable(rankState.catFilter);
  }
  /* Sin filtro: mostrar todas las categorías que tienen equipos */
  var html='';
  DATA.categories.forEach(function(cat){
    if(!cat.teams.length)return;
    html+='<div class="standings-cat-hdr"><span class="standings-dot" style="background:'+cat.accent+'"></span>'+esc(cat.name)+'</div>';
    html+=buildStandingsTable(cat.id);
  });
  return html||emptyHtml();
}

function buildStandingsTable(catId){
  var cat=DATA.categories.find(function(c){return c.id===catId;});
  if(!cat||!cat.teams.length)return emptyHtml();

  var teams=cat.teams.slice().sort(function(a,b){
    if(b.wins!==a.wins)return b.wins-a.wins;
    var dA=(a.pf||0)-(a.pa||0), dB=(b.pf||0)-(b.pa||0);
    if(dB!==dA)return dB-dA;
    return a.losses-b.losses;
  });

  var rows=teams.map(function(t,i){
    var pj=(t.wins||0)+(t.losses||0);
    var pf=t.pf||0, pa=t.pa||0, dif=pf-pa;
    var difStr=(dif>0?'+':'')+dif;
    var isTop=i===0&&t.wins>0;
    var logo=t.cover?'<img src="'+esc(t.cover)+'" style="width:22px;height:22px;border-radius:6px;object-fit:cover;vertical-align:middle;margin-right:6px;">':'<span class="stand-dot" style="background:'+t.colorPrimary+'"></span>';
    return '<tr class="stand-row'+(isTop?' stand-top':'')+'" data-route="#/equipo/'+t.id+'">'+
      '<td class="stand-pos">'+(i+1)+'</td>'+
      '<td class="stand-team">'+logo+'<span>'+esc(t.name)+'</span></td>'+
      '<td class="stand-num">'+pj+'</td>'+
      '<td class="stand-num stand-g">'+t.wins+'</td>'+
      '<td class="stand-num stand-p">'+t.losses+'</td>'+
      '<td class="stand-num">'+pf+'</td>'+
      '<td class="stand-num">'+pa+'</td>'+
      '<td class="stand-num stand-dif'+(dif>0?' stand-pos-dif':dif<0?' stand-neg-dif':'')+'">'+difStr+'</td>'+
    '</tr>';
  }).join('');

  return '<div class="standings-wrap">'+
    '<table class="standings-tbl">'+
      '<thead><tr>'+
        '<th class="stand-pos">Pos</th>'+
        '<th class="stand-team-hdr">Equipo</th>'+
        '<th class="stand-num">PJ</th>'+
        '<th class="stand-num stand-g">G</th>'+
        '<th class="stand-num stand-p">P</th>'+
        '<th class="stand-num">PF</th>'+
        '<th class="stand-num">PC</th>'+
        '<th class="stand-num">DIF</th>'+
      '</tr></thead>'+
      '<tbody>'+rows+'</tbody>'+
    '</table>'+
  '</div>';
}

function buildChampHtml(){
  var all=DATA.champions||[];
  var seasons=['Torneo Playa 2026','Verano 2026','Temporada 2025'];
  all.forEach(function(c){if(seasons.indexOf(c.season)===-1)seasons.push(c.season);});
  var filtered=champState.catFilter==='all'?all:all.filter(function(c){return c.catId===champState.catFilter;});
  if(!filtered.length)return emptyHtml();
  var html='';
  seasons.forEach(function(season){
    var entries=filtered.filter(function(c){return c.season===season;});
    if(!entries.length)return;
    var icon=season.indexOf('Playa')!==-1?'🏖️':season.indexOf('2025')!==-1?'📅':'🏆';
    html+='<div class="champ-season-hdr">'+icon+' '+esc(season)+'</div>';
    html+='<div class="champ-grid">'+entries.map(champCardHtml).join('')+'</div>';
  });
  return html||emptyHtml();
}
function champCardHtml(c){

  return'<div class="champ-card">'+photoHtml+

/* ── EVENTOS ── */
document.addEventListener('click',function(e){
  var t=e.target.closest('[data-route],[data-action]');
  if(!t)return;
  e.preventDefault();
  if(t.hasAttribute('data-action')){handleAction(t.getAttribute('data-action'),t.dataset);}
  else{go(t.getAttribute('data-route'));}
});

function handleAction(a,ds){
  if(a==='back'){history.back();return;}
  if(a==='admin-toggle'){if(ADMIN){ADMIN=false;render();toast('Admin desactivado');}else{showPinModal();}return;}
  if(a==='modal-close'){closeModal();return;}
  if(a==='rank-tab'){rankState.tab=ds.tab;render();return;}
  if(a==='rank-stat'){rankState.stat=ds.stat;render();return;}
  if(a==='lb'){if(ds.lb)openLb(ds.lb);return;}
  if(a==='edit-cat'){showEditCatModal(ds.id);return;}
  if(a==='edit-team'){showEditTeamModal(ds.id);return;}
  if(a==='add-team'){showAddTeamModal(ds.cat);return;}
  if(a==='edit-player'){showEditPlayerModal(ds.id);return;}
  if(a==='add-player'){showAddPlayerModal(ds.team);return;}
  if(a==='add-champ'){showAddChampModal();return;}
  if(a==='edit-champ'){showEditChampModal(ds.id);return;}
  if(a==='cal-j'){calState.jornada=parseInt(ds.j);render();return;}
  if(a==='add-match'){showAddMatchModal(ds.j||calState.jornada);return;}
  if(a==='edit-match'){showEditMatchModal(ds.id);return;}
}

}
function showAddChampModal(){
  var defCat=champState.catFilter!=='all'?champState.catFilter:(DATA.categories[0]&&DATA.categories[0].id);
  var blank={catId:defCat,season:'',team:'',runnerUp:'',score:'',photo:''};
  openModal('<h3>Agregar campeón</h3>'+champForm(blank)+
    '<div class="modal-actions"><button class="btn btn-s" data-action="modal-close">Cancelar</button><button class="btn btn-p" id="b-s">Guardar</button></div>');
  document.getElementById('b-s').onclick=async function(){
    readChamp(blank);if(!blank.season||!blank.team){toast('Completa temporada y equipo');return;}
    blank.id=uid();DATA.champions.push(blank);closeModal();await persist();render();toast('Campeón agregado');
  };
}
function showEditChampModal(champId){
  var c=(DATA.champions||[]).find(function(x){return x.id===champId;});if(!c)return;
  openModal('<h3>Editar campeón</h3>'+champForm(c)+
    '<div class="modal-actions"><button class="btn btn-d" id="b-d">Eliminar</button></div>'+
    '<div class="modal-actions"><button class="btn btn-s" data-action="modal-close">Cancelar</button><button class="btn btn-p" id="b-s">Guardar</button></div>');
  document.getElementById('b-s').onclick=async function(){readChamp(c);closeModal();await persist();render();toast('Actualizado');};
  document.getElementById('b-d').onclick=async function(){
    if(!confirm('¿Eliminar registro?'))return;
    DATA.champions=DATA.champions.filter(function(x){return x.id!==champId;});
    closeModal();await persist();render();toast('Eliminado');
  };
}

/* ── INIT ── */
(async function init(){
  modalRoot=document.getElementById('modal-root');
  document.getElementById('lb-close').addEventListener('click',closeLb);
  document.getElementById('lightbox').addEventListener('click',function(e){if(e.target===this)closeLb();});
  document.addEventListener('keydown',function(e){if(e.key==='Escape')closeLb();});
  var ll=document.getElementById('ll');if(ll)ll.src=LOGO_SRC;
  DATA=await loadData();
  rebuildIndex();
  document.getElementById('loading').style.display='none';
  render();
})();

</script>
