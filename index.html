<!doctype html>
<html lang="es">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#0A4A3E">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>Flag Mazatlán</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Anton&family=Manrope:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
:root{
  --field-dark:#0A4A3E;
  --field-mid:#0E6354;
  --field-line:rgba(255,255,255,.14);
  --teal:#2EC4C0;
  --wave:#2D8FD8;
  --sand:#FBF3E1;
  --sand-dim:#EFE3C6;
  --ink:#0D2622;
  --ink-soft:#557067;
  --flag-yellow:#FFC93C;
  --coral:#FF9645;
  --pink:#FFD66B;
  --white:#FFFFFF;
  --danger:#C2402F;
  --radius:18px;
  --radius-sm:12px;
  --shadow:0 18px 40px -18px rgba(8,40,33,.5);
  --card-shadow:0 3px 14px -8px rgba(13,38,34,.18);
}
*{box-sizing:border-box;}
html,body{margin:0;padding:0;}
body{
  background:
    radial-gradient(130% 90% at 50% -12%, #1a6358 0%, #0a3530 45%, #051815 100%);
  font-family:'Manrope',system-ui,sans-serif;
  color:var(--ink);
  min-height:100vh;
  -webkit-font-smoothing:antialiased;
}
.brand-strip{height:5px;background:linear-gradient(90deg,var(--teal) 0%, #4FBF8F 24%, #8AC36B 44%, var(--flag-yellow) 64%, #FFA93C 82%, var(--coral) 100%);flex-shrink:0;}
.app{
  max-width:480px;
  margin:0 auto;
  min-height:100vh;
  background:var(--sand);
  display:flex;
  flex-direction:column;
  position:relative;
  box-shadow:var(--shadow);
}
@media (min-width:520px){
  body{padding:28px 12px;}
  .app{min-height:calc(100vh - 56px);border-radius:34px;overflow:hidden;}
}
a{color:inherit;text-decoration:none;}
button{font-family:inherit;cursor:pointer;border:none;background:none;color:inherit;}
input,select,textarea{font-family:inherit;}

/* ---------- HEADER ---------- */
.topbar{
  position:sticky;top:0;z-index:30;
  background:linear-gradient(120deg,var(--field-dark) 0%,#083F35 100%);
  color:var(--sand);
  padding:14px 14px 12px;
  display:flex;align-items:center;gap:10px;
  border-bottom:1px solid var(--field-line);
}
.topbar .tb-btn{
  width:36px;height:36px;border-radius:50%;
  display:flex;align-items:center;justify-content:center;
  background:rgba(255,255,255,.08);
  flex-shrink:0;
}
.topbar .tb-btn:active{background:rgba(255,255,255,.18);}
.tb-logo{width:36px;height:36px;border-radius:11px;overflow:hidden;flex-shrink:0;border:1px solid rgba(255,255,255,.18);}
.tb-logo img{width:100%;height:100%;object-fit:cover;display:block;}
.topbar .tb-title{
  flex:1;min-width:0;
  font-family:'Anton',sans-serif;
  font-weight:400;
  letter-spacing:.02em;
  font-size:19px;
  text-transform:uppercase;
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
}
.topbar .tb-sub{display:block;font-family:'Manrope';font-size:11px;text-transform:none;color:var(--flag-yellow);letter-spacing:.02em;font-weight:600;}
.tb-admin{position:relative;}
.tb-admin.is-on .tb-btn{background:var(--flag-yellow);color:var(--field-dark);}
.tb-dot{position:absolute;top:-2px;right:-2px;width:9px;height:9px;border-radius:50%;background:var(--coral);border:2px solid var(--field-dark);}

/* ---------- CONTENT ---------- */
.content{flex:1;padding:16px 16px 96px;}
.section-title{
  font-family:'Anton',sans-serif;font-weight:400;
  font-size:22px;letter-spacing:.01em;text-transform:uppercase;
  margin:4px 0 12px;color:var(--ink);
}
.eyebrow{
  font-size:11px;font-weight:800;letter-spacing:.12em;text-transform:uppercase;
  color:var(--ink-soft);margin:0 0 4px;
}

/* ═══ HERO ═══ */
.hero{
  border-radius:18px;
  color:var(--sand);position:relative;
  overflow:hidden;margin:0 4px 14px;background:#071E18;
}
.hero-bg{
  position:absolute;inset:0;
  background:linear-gradient(135deg,#0E5C4A 0%,#083D30 45%,#071E18 100%);
  z-index:0;
}
/* líneas diagonales estilo cancha */
.hero-lines{
  position:absolute;inset:0;z-index:1;overflow:hidden;pointer-events:none;opacity:.055;
}
.hero-lines::before{
  content:'';position:absolute;
  top:-60px;left:-40px;right:-40px;bottom:-60px;
  background:repeating-linear-gradient(
    -55deg,
    white 0px, white 1px,
    transparent 1px, transparent 30px
  );
}
.hero-blob{
  position:absolute;right:-40px;top:-20px;
  width:180px;height:180px;border-radius:50%;
  background:radial-gradient(circle, rgba(255,201,60,.14) 0%, transparent 65%);
  z-index:1;filter:blur(6px);
}
.hero-glow{
  position:absolute;left:-40px;bottom:0px;
  width:160px;height:160px;border-radius:50%;
  background:radial-gradient(circle, rgba(46,196,192,.13) 0%, transparent 65%);
  z-index:1;filter:blur(8px);
}
/* franja izquierda de acento */
.hero-accent-bar{
  position:absolute;left:0;top:0;bottom:0;width:4px;z-index:3;
  background:linear-gradient(180deg,var(--flag-yellow) 0%,var(--coral) 60%,var(--teal) 100%);
}
.hero-body{
  position:relative;z-index:2;
  padding:12px 14px 12px 18px;
  display:flex;flex-direction:row;align-items:center;gap:12px;
}
/* Logo compacto a la izquierda */
.hero-logo-col{display:flex;flex-direction:column;align-items:center;flex-shrink:0;}
.hero-logo-ring{
  width:66px;height:66px;border-radius:16px;
  padding:3px;
  background:linear-gradient(135deg,rgba(255,201,60,.55),rgba(46,196,192,.25));
  box-shadow:0 0 0 1px rgba(255,201,60,.25),0 10px 24px -8px rgba(0,0,0,.7);
  display:flex;align-items:center;justify-content:center;
}
.hero-logo-ring img{width:100%;height:100%;border-radius:17px;object-fit:cover;display:block;}
.hero-season-badge{
  margin-top:7px;
  background:linear-gradient(90deg,var(--flag-yellow),var(--coral));
  color:var(--ink);font-family:"Anton";font-weight:400;font-size:8.5px;
  letter-spacing:.1em;text-transform:uppercase;
  padding:3px 10px;border-radius:20px;white-space:nowrap;
  box-shadow:0 3px 8px rgba(255,140,50,.4);
}
/* Info a la derecha */
.hero-info-col{flex:1;min-width:0;display:flex;flex-direction:column;}
.hero-league-name{margin-bottom:0;}
.hero-league-name .hn-top{
  font-size:8.5px;font-weight:800;letter-spacing:.18em;text-transform:uppercase;
  color:rgba(180,230,215,.5);display:block;margin-bottom:2px;
}
.hero-league-name .hn-main{
  font-family:'Anton';font-weight:400;font-size:23px;letter-spacing:.04em;
  text-transform:uppercase;line-height:.95;color:#fff;display:block;
  text-shadow:0 2px 16px rgba(0,0,0,.5);
}
.hero-league-name .hn-sub{
  font-family:'Anton';font-weight:400;font-size:12px;letter-spacing:.14em;
  text-transform:uppercase;color:var(--flag-yellow);display:block;margin-top:3px;
  text-shadow:0 0 14px rgba(255,190,0,.35);
}
/* Separador deportivo */
.hero-sep{
  height:1px;margin:8px 0 7px;
  background:linear-gradient(90deg,rgba(255,201,60,.5),rgba(255,255,255,.1),transparent);
}
/* Countdown: cajas que se expanden para llenar todo el ancho */
.hero-cd-label{
  font-size:8px;font-weight:800;letter-spacing:.1em;text-transform:uppercase;
  color:rgba(170,215,200,.55);margin-bottom:6px;display:flex;align-items:center;gap:4px;
}
.hero-cd-row{
  display:flex;align-items:stretch;gap:4px;width:100%;
}
.hcd-box{
  flex:1;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  background:rgba(255,255,255,.08);
  border:1px solid rgba(255,255,255,.12);
  border-radius:10px;
  padding:7px 4px;
  backdrop-filter:blur(6px);
  box-shadow:inset 0 1px 0 rgba(255,255,255,.07);
}
.hcd-box b{
  font-family:'Anton';font-weight:400;font-size:20px;
  color:var(--flag-yellow);line-height:1;
  text-shadow:0 0 16px rgba(255,201,60,.55);
}
.hcd-box span{
  font-size:7px;text-transform:uppercase;letter-spacing:.1em;
  color:rgba(170,220,205,.7);margin-top:3px;font-weight:800;
}
.hcd-sep{
  font-family:'Anton';font-size:16px;color:rgba(255,201,60,.4);
  display:flex;align-items:center;padding-bottom:8px;flex-shrink:0;
}
.hero-started{
  font-family:'Anton';font-weight:400;font-size:13px;
  color:var(--flag-yellow);letter-spacing:.05em;text-transform:uppercase;
  text-shadow:0 0 14px rgba(255,201,60,.4);
}
/* Redes + inscripción */
.hero-social-row{
  display:flex;align-items:center;gap:5px;flex-wrap:wrap;margin-top:0;
}
.hero-social-btn{
  display:inline-flex;align-items:center;gap:4px;
  background:rgba(255,255,255,.09);
  border:1px solid rgba(255,255,255,.14);
  border-radius:20px;padding:4px 9px;
  font-size:9px;font-weight:800;color:rgba(220,240,235,.9);
  text-decoration:none;letter-spacing:.02em;flex-shrink:0;
}
.hero-social-btn:active{background:rgba(255,255,255,.18);}
.hero-social-fb{background:rgba(24,119,242,.18);border-color:rgba(24,119,242,.3);}
.hero-inscribe-btn{
  display:inline-flex;align-items:center;gap:4px;
  background:linear-gradient(90deg,var(--flag-yellow),var(--coral));
  border-radius:20px;padding:4px 10px;
  font-size:9px;font-weight:800;color:var(--ink);
  text-decoration:none;letter-spacing:.02em;
  box-shadow:0 3px 10px rgba(255,150,50,.4);
  white-space:nowrap;flex-shrink:0;
}
.hero-wave{
  position:relative;z-index:2;
  display:block;margin-bottom:-2px;line-height:0;
  margin-top:-8px;
}
.hero-wave svg{display:block;width:100%;height:28px;}
/* search */
.search-box{
  display:flex;align-items:center;gap:9px;
  background:var(--white);
  border:1.5px solid var(--sand-dim);
  border-radius:16px;
  padding:12px 14px;margin-bottom:16px;
  box-shadow:var(--card-shadow);
}
.search-box input{flex:1;border:none;outline:none;background:transparent;font-size:14.5px;color:var(--ink);}
.search-box svg{flex-shrink:0;color:var(--ink-soft);}

/* category list */
.cat-card{
  display:flex;align-items:center;gap:13px;
  background:var(--white);border-radius:var(--radius-sm);
  padding:13px 14px;margin-bottom:9px;
  border:1px solid var(--sand-dim);
  box-shadow:var(--card-shadow);
  position:relative;
  transition:transform .12s ease,box-shadow .12s ease;
}
.cat-card:active{transform:scale(.99);box-shadow:none;}
.cat-band{width:5px;align-self:stretch;border-radius:6px;flex-shrink:0;}
.cat-info{flex:1;min-width:0;}
.cat-info h3{margin:0 0 2px;font-size:15px;font-weight:800;color:var(--ink);}
.cat-info span{font-size:12px;color:var(--ink-soft);}
.cat-arrow{opacity:.35;flex-shrink:0;}
.cat-edit{position:absolute;top:8px;right:8px;}

/* grid */
.grid-2{display:grid;grid-template-columns:1fr 1fr;gap:10px;}

/* team card */
.team-card{
  background:var(--white);border-radius:var(--radius-sm);
  border:1px solid var(--sand-dim);overflow:hidden;position:relative;
  box-shadow:var(--card-shadow);
  transition:transform .12s ease;
}
.team-card:active{transform:scale(.98);}
.team-cover{
  height:72px;display:flex;align-items:center;justify-content:center;
  font-family:'Anton';font-weight:400;font-size:22px;color:rgba(255,255,255,.92);
  background-size:cover;background-position:center;letter-spacing:.04em;
  position:relative;overflow:hidden;
}
.team-cover::after{
  content:'';position:absolute;inset:0;
  background:linear-gradient(0deg,rgba(0,0,0,.28) 0%,transparent 60%);
}
.team-card .team-body{padding:10px 11px 12px;}
.team-card h4{margin:0 0 2px;font-size:13px;font-weight:800;line-height:1.2;color:var(--ink);}
.team-card .team-meta{font-size:10.5px;color:var(--ink-soft);}
.record-pill{
  display:inline-flex;align-items:center;gap:3px;
  margin-top:6px;font-size:10px;font-weight:800;letter-spacing:.04em;
  background:linear-gradient(90deg,var(--field-dark),var(--field-mid));
  color:var(--flag-yellow);
  padding:3px 9px;border-radius:30px;
}
.add-card{
  border:2px dashed var(--sand-dim);border-radius:var(--radius-sm);
  display:flex;flex-direction:column;align-items:center;justify-content:center;gap:6px;
  min-height:140px;color:var(--ink-soft);font-size:12px;font-weight:700;
  background:rgba(255,255,255,.5);
}

/* detail banner */
.banner{
  border-radius:22px;overflow:hidden;position:relative;margin-bottom:14px;
  min-height:160px;display:flex;align-items:flex-end;
  background-size:cover;background-position:center;
  box-shadow:0 12px 32px -12px rgba(0,0,0,.4);
}
.banner::before{content:'';position:absolute;inset:0;background:linear-gradient(0deg, rgba(8,35,30,.75) 0%, rgba(8,35,30,.2) 55%, rgba(8,35,30,.05) 100%);}
.banner-content{position:relative;z-index:1;padding:18px;color:var(--white);width:100%;}
.banner-tag{
  display:inline-block;font-size:10px;font-weight:800;letter-spacing:.1em;text-transform:uppercase;
  background:rgba(255,255,255,.16);padding:4px 10px;border-radius:30px;margin-bottom:8px;
  backdrop-filter:blur(3px);border:1px solid rgba(255,255,255,.2);
}
.banner h2{font-family:'Anton';font-weight:400;font-size:27px;margin:0 0 2px;text-transform:uppercase;letter-spacing:.01em;text-shadow:0 2px 8px rgba(0,0,0,.3);}
.banner small{font-size:12px;opacity:.82;}

.info-row{display:flex;gap:9px;margin-bottom:16px;}
.info-box{
  flex:1;background:var(--white);border:1px solid var(--sand-dim);
  border-radius:var(--radius-sm);padding:11px 8px;text-align:center;
  box-shadow:var(--card-shadow);
}
.info-box b{display:block;font-family:'Anton';font-weight:400;font-size:20px;color:var(--field-dark);}
.info-box span{font-size:9.5px;text-transform:uppercase;letter-spacing:.06em;color:var(--ink-soft);}

.blurb{font-size:13.5px;line-height:1.6;color:var(--ink-soft);margin-bottom:18px;}

.row-between{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;}
.row-between .section-title{margin:0;}
.pencil-btn{
  width:32px;height:32px;border-radius:50%;background:var(--white);border:1px solid var(--sand-dim);
  display:flex;align-items:center;justify-content:center;flex-shrink:0;box-shadow:var(--card-shadow);
}

/* roster row */
.roster-row{
  display:flex;align-items:center;gap:12px;
  background:var(--white);border:1px solid var(--sand-dim);border-radius:14px;
  padding:10px 12px;margin-bottom:7px;
  box-shadow:var(--card-shadow);
  transition:transform .1s ease;
}
.roster-row:active{transform:scale(.99);}
.jersey{
  width:40px;height:40px;border-radius:11px;flex-shrink:0;
  display:flex;align-items:center;justify-content:center;
  font-family:'Anton';font-weight:400;font-size:15px;color:var(--white);
  background-size:cover;background-position:center;
}
.roster-info{flex:1;min-width:0;}
.roster-info h4{margin:0 0 2px;font-size:13.5px;font-weight:800;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;color:var(--ink);}
.roster-info span{font-size:11px;color:var(--ink-soft);}
.add-row{
  border:2px dashed var(--sand-dim);border-radius:14px;
  display:flex;align-items:center;justify-content:center;gap:6px;
  padding:13px;color:var(--ink-soft);font-size:12.5px;font-weight:700;
}

/* player header */
.player-hero{display:flex;gap:14px;align-items:center;margin-bottom:16px;}
.player-photo{
  width:88px;height:88px;border-radius:22px;flex-shrink:0;
  background-size:cover;background-position:center;
  display:flex;align-items:center;justify-content:center;
  font-family:'Anton';font-weight:400;font-size:30px;color:var(--white);
  box-shadow:0 10px 28px -8px rgba(10,74,62,.5);
}
.player-name{font-family:'Anton';font-weight:400;font-size:22px;text-transform:uppercase;line-height:1.04;margin:0 0 5px;color:var(--ink);}
.pos-pill{
  display:inline-block;font-size:10.5px;font-weight:800;
  background:linear-gradient(120deg,var(--field-dark),var(--field-mid));
  color:var(--flag-yellow);padding:3px 10px;border-radius:30px;letter-spacing:.04em;margin-right:5px;
}
.team-link{font-size:12px;color:var(--ink-soft);display:block;margin-top:5px;}
.team-link b{color:var(--ink);}

.stat-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:9px;margin-bottom:18px;}
.stat-box{
  background:linear-gradient(140deg,var(--field-dark) 0%,var(--field-mid) 100%);
  color:var(--sand);border-radius:var(--radius-sm);padding:14px 8px;text-align:center;
  box-shadow:0 6px 16px -6px rgba(10,74,62,.4);
}
.stat-box b{display:block;font-family:'Anton';font-weight:400;font-size:26px;color:var(--flag-yellow);line-height:1;}
.stat-box span{font-size:9.5px;text-transform:uppercase;letter-spacing:.07em;color:rgba(210,240,234,.85);display:block;margin-top:5px;}

/* result rows / empty */
.result-row{
  display:flex;align-items:center;gap:12px;
  background:var(--white);border:1px solid var(--sand-dim);border-radius:14px;
  padding:11px 13px;margin-bottom:8px;box-shadow:var(--card-shadow);
  transition:transform .1s ease;
}
.result-row:active{transform:scale(.99);}
.result-icon{width:36px;height:36px;border-radius:10px;background:linear-gradient(135deg,var(--field-dark),var(--teal));color:var(--flag-yellow);display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.result-row h4{margin:0 0 2px;font-size:13.5px;font-weight:800;color:var(--ink);}
.result-row span{font-size:11.5px;color:var(--ink-soft);}
.empty-state{text-align:center;padding:44px 14px;color:var(--ink-soft);}
.empty-state svg{opacity:.3;margin-bottom:12px;color:var(--teal);}
.empty-state p{font-size:13px;margin:0;line-height:1.5;}

/* rankings */
.tabs{
  display:flex;background:var(--white);border:1px solid var(--sand-dim);
  border-radius:16px;padding:4px;margin-bottom:14px;box-shadow:var(--card-shadow);
}
.tab-btn{flex:1;text-align:center;padding:10px 4px;border-radius:12px;font-size:12.5px;font-weight:800;color:var(--ink-soft);}
.tab-btn.active{
  background:linear-gradient(120deg,var(--field-dark),var(--field-mid));
  color:var(--flag-yellow);box-shadow:0 4px 10px -4px rgba(10,74,62,.45);
}
.chip-row{display:flex;gap:7px;overflow-x:auto;padding-bottom:3px;margin-bottom:12px;}
.chip-row::-webkit-scrollbar{height:0;}
.chip{
  flex-shrink:0;padding:8px 14px;border-radius:30px;
  background:var(--white);border:1.5px solid var(--sand-dim);
  font-size:12px;font-weight:800;color:var(--ink-soft);white-space:nowrap;
  box-shadow:var(--card-shadow);
}
.chip.active{
  background:linear-gradient(120deg,var(--field-dark),var(--teal));
  color:var(--white);border-color:transparent;
  box-shadow:0 4px 12px -4px rgba(10,74,62,.4);
}
.select-field{
  width:100%;border:1.5px solid var(--sand-dim);border-radius:14px;
  padding:11px 12px;font-size:13.5px;background:var(--white);color:var(--ink);
  margin-bottom:14px;box-shadow:var(--card-shadow);
}
.rank-row{
  display:flex;align-items:center;gap:12px;
  background:var(--white);border:1px solid var(--sand-dim);border-radius:14px;
  padding:11px 13px;margin-bottom:8px;box-shadow:var(--card-shadow);
  transition:transform .1s ease;
}
.rank-row:active{transform:scale(.99);}
.rank-num{
  width:30px;height:30px;border-radius:9px;background:var(--sand-dim);
  display:flex;align-items:center;justify-content:center;
  font-family:'Anton';font-weight:400;font-size:14px;flex-shrink:0;color:var(--ink);
}
.rank-num.top1{background:var(--flag-yellow);color:var(--field-dark);}
.rank-num.top2{background:#DDD9CF;color:var(--ink);}
.rank-num.top3{background:#E8C99C;color:var(--ink);}
.rank-info{flex:1;min-width:0;}
.rank-info h4{margin:0 0 2px;font-size:13.5px;font-weight:800;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;color:var(--ink);}
.rank-info span{font-size:11px;color:var(--ink-soft);}
.rank-value{font-family:'Anton';font-weight:400;font-size:20px;color:var(--field-dark);flex-shrink:0;text-align:right;}
.rank-value small{display:block;font-family:'Manrope';font-size:9px;text-transform:uppercase;color:var(--ink-soft);font-weight:700;text-align:right;letter-spacing:.04em;}
.champ-row{
  display:flex;align-items:center;gap:12px;
  background:var(--white);border:1px solid var(--sand-dim);border-radius:14px;
  padding:11px 13px;margin-bottom:8px;box-shadow:var(--card-shadow);
}
.champ-icon{
  width:36px;height:36px;border-radius:10px;flex-shrink:0;
  background:linear-gradient(135deg,var(--flag-yellow),var(--coral));
  color:var(--field-dark);display:flex;align-items:center;justify-content:center;
  box-shadow:0 4px 10px -4px rgba(255,150,60,.5);
}
.champ-info{flex:1;min-width:0;}
.champ-info h4{margin:0 0 2px;font-size:13.5px;font-weight:800;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;color:var(--ink);}
.champ-info span{font-size:11px;color:var(--ink-soft);}

/* bottom nav */
.bottomnav{
  position:sticky;bottom:0;z-index:30;
  display:flex;
  background:rgba(255,251,245,.97);
  border-top:1px solid var(--sand-dim);
  padding:8px 6px calc(8px + env(safe-area-inset-bottom));
  backdrop-filter:blur(12px);
  -webkit-backdrop-filter:blur(12px);
}
.nav-btn{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;padding:6px 1px;border-radius:12px;color:var(--ink-soft);}
.nav-btn svg{width:20px;height:20px;flex-shrink:0;}
.nav-btn.active{color:var(--field-dark);}
.nav-btn.active svg{stroke:var(--field-dark);}
.nav-btn span{font-size:9.5px;font-weight:700;letter-spacing:.01em;text-align:center;line-height:1.15;}

/* admin banner */
.admin-banner{
  background:linear-gradient(120deg,#FFC93C,#FFD97A);
  color:var(--field-dark);border-radius:14px;padding:10px 13px;margin-bottom:16px;
  display:flex;align-items:center;gap:10px;font-size:12px;font-weight:700;
  box-shadow:0 4px 14px -6px rgba(255,180,30,.5);
}
.admin-banner button{margin-left:auto;text-decoration:underline;font-size:12px;flex-shrink:0;}

/* modal */
.modal-root{position:fixed;inset:0;z-index:100;display:none;}
.modal-root.open{display:block;}
.modal-backdrop{position:absolute;inset:0;background:rgba(5,22,18,.64);display:flex;align-items:flex-end;justify-content:center;backdrop-filter:blur(3px);}
@media (min-width:520px){.modal-backdrop{align-items:center;}}
.modal-card{
  background:var(--sand);width:100%;max-width:480px;max-height:88vh;overflow:auto;
  border-radius:26px 26px 0 0;padding:22px 18px calc(22px + env(safe-area-inset-bottom));
  animation:slideUp .22s cubic-bezier(.34,1.26,.64,1);
}
@media (min-width:520px){.modal-card{border-radius:22px;}}
@keyframes slideUp{from{transform:translateY(28px);opacity:0;}to{transform:translateY(0);opacity:1;}}
.modal-card h3{
  font-family:'Anton';font-weight:400;font-size:20px;text-transform:uppercase;
  margin:0 0 16px;color:var(--ink);letter-spacing:.02em;
}
.field{margin-bottom:12px;}
.field label{display:block;font-size:10.5px;font-weight:800;text-transform:uppercase;letter-spacing:.07em;color:var(--ink-soft);margin-bottom:5px;}
.field input,.field select,.field textarea{
  width:100%;border:1.5px solid var(--sand-dim);border-radius:12px;padding:11px 13px;
  font-size:14px;color:var(--ink);background:var(--white);outline:none;
  transition:border-color .15s;
}
.field input:focus,.field select:focus,.field textarea:focus{border-color:var(--teal);}
.field textarea{resize:vertical;min-height:68px;}
.field-hint{font-size:11px;color:var(--ink-soft);margin-top:4px;}
.field-row{display:flex;gap:10px;}
.field-row .field{flex:1;}
.stat-fields{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;margin-bottom:4px;}
.modal-actions{display:flex;gap:10px;margin-top:18px;}
.btn{
  flex:1;padding:13px;border-radius:14px;font-weight:800;font-size:13px;
  text-align:center;text-transform:uppercase;letter-spacing:.04em;
}
.btn-primary{
  background:linear-gradient(120deg,var(--field-dark) 0%,var(--field-mid) 100%);
  color:var(--flag-yellow);
  box-shadow:0 6px 18px -6px rgba(10,74,62,.55);
}
.btn-secondary{background:var(--sand-dim);color:var(--ink);}
.btn-danger{background:transparent;color:var(--danger);flex:none;text-decoration:underline;text-transform:none;font-weight:700;letter-spacing:0;}
.pin-dots{display:flex;gap:10px;justify-content:center;margin:18px 0;}
.pin-dots input{width:46px;height:54px;text-align:center;font-size:22px;font-family:'Anton';border-radius:12px;border:1.5px solid var(--sand-dim);}

/* toast */
.toast{
  position:fixed;left:50%;bottom:92px;transform:translateX(-50%) translateY(20px);
  background:var(--ink);color:var(--flag-yellow);
  padding:11px 20px;border-radius:30px;font-size:13px;font-weight:800;
  opacity:0;pointer-events:none;transition:all .25s cubic-bezier(.34,1.26,.64,1);
  z-index:200;white-space:nowrap;
  box-shadow:0 10px 28px -8px rgba(0,0,0,.5);
  border:1px solid rgba(255,201,60,.2);
}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0);}

.loading-screen{
  min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:18px;
  background:linear-gradient(160deg,#084E40 0%,#0A3530 50%,#071D1A 100%);
  color:var(--sand);
}
.loading-screen img{width:72px;height:72px;border-radius:20px;object-fit:cover;box-shadow:0 12px 32px -10px rgba(0,0,0,.6);}
.loading-screen .spinner{width:34px;height:34px;border-radius:50%;border:3px solid rgba(255,255,255,.15);border-top-color:var(--flag-yellow);animation:spin .8s linear infinite;}
@keyframes spin{to{transform:rotate(360deg);}}
.loading-screen b{font-family:'Anton';font-weight:400;letter-spacing:.08em;text-transform:uppercase;font-size:14px;color:rgba(220,240,235,.75);}

/* lightbox */
.lightbox{
  position:fixed;inset:0;z-index:500;
  background:rgba(0,0,0,.92);
  display:none;align-items:center;justify-content:center;
  padding:20px;
}
.lightbox.open{display:flex;}
.lightbox img{
  max-width:100%;max-height:88vh;
  border-radius:16px;object-fit:contain;
  box-shadow:0 24px 60px rgba(0,0,0,.7);
  animation:lbIn .2s ease;
}
@keyframes lbIn{from{transform:scale(.92);opacity:0;}to{transform:scale(1);opacity:1;}}
.lightbox-close{
  position:absolute;top:16px;right:16px;
  width:40px;height:40px;border-radius:50%;
  background:rgba(255,255,255,.12);border:1px solid rgba(255,255,255,.2);
  color:#fff;font-size:22px;line-height:1;
  display:flex;align-items:center;justify-content:center;cursor:pointer;
}
.lb-trigger{cursor:zoom-in;}

::-webkit-scrollbar{width:0;height:0;}

/* countdown / season banner */
.season-banner{
  background:linear-gradient(120deg,#0A3D52 0%,#0D6480 50%,#0F82A8 100%);
  border-radius:18px;padding:14px 16px;margin-bottom:14px;
  display:flex;align-items:center;gap:14px;
  box-shadow:0 8px 22px -8px rgba(15,90,140,.5);
  position:relative;overflow:hidden;
}
.season-banner::after{
  content:'🌊';position:absolute;right:14px;bottom:-4px;font-size:44px;opacity:.22;line-height:1;
}
.season-banner-icon{
  width:44px;height:44px;border-radius:14px;flex-shrink:0;
  background:rgba(255,255,255,.12);
  display:flex;align-items:center;justify-content:center;font-size:22px;
}
.season-banner-body{flex:1;min-width:0;}
.season-banner-label{font-size:10px;font-weight:800;text-transform:uppercase;letter-spacing:.1em;color:rgba(180,230,255,.8);margin-bottom:4px;}
.season-banner-title{font-family:'Anton';font-weight:400;font-size:17px;color:#fff;text-transform:uppercase;letter-spacing:.03em;margin-bottom:6px;}
.countdown-row{display:flex;gap:8px;}
.cd-box{background:rgba(255,255,255,.12);border:1px solid rgba(255,255,255,.15);border-radius:10px;padding:5px 8px;text-align:center;min-width:44px;}
.cd-box b{display:block;font-family:'Anton';font-weight:400;font-size:17px;color:var(--flag-yellow);line-height:1;}
.cd-box span{font-size:8.5px;text-transform:uppercase;letter-spacing:.06em;color:rgba(200,235,255,.75);}
.cd-started{font-size:13px;font-weight:800;color:var(--flag-yellow);display:flex;align-items:center;gap:6px;}
.champ-pill{
  flex-shrink:0;background:var(--white);border:1px solid var(--sand-dim);
  border-radius:12px;padding:9px 12px;min-width:130px;
  box-shadow:var(--card-shadow);
}
.champ-pill-cat{font-size:9.5px;font-weight:800;text-transform:uppercase;letter-spacing:.06em;color:var(--ink-soft);margin-bottom:3px;}
.champ-pill-name{font-size:13px;font-weight:800;color:var(--ink);}
.champ-pills-row{display:flex;gap:8px;overflow-x:auto;padding-bottom:4px;margin-bottom:18px;}
.champ-pills-row::-webkit-scrollbar{height:0;}
</style>
</head>

/* ================= PRNG / HELPERS ================= */
function mulberry32(a){
  return function(){
    a |= 0; a = a + 0x6D2B79F5 | 0;
    var t = Math.imul(a ^ a >>> 15, 1 | a);
    t = t + Math.imul(t ^ t >>> 7, 61 | t) ^ t;
    return ((t ^ t >>> 14) >>> 0) / 4294967296;
  };
}
function randInt(r,min,max){ return Math.floor(r()*(max-min+1))+min; }
function pick(r,arr){ return arr[Math.floor(r()*arr.length)]; }
function shuffle(r,arr){
  var a = arr.slice();
  for(var i=a.length-1;i>0;i--){
    var j = Math.floor(r()*(i+1));
    var tmp=a[i]; a[i]=a[j]; a[j]=tmp;
  }
  return a;
}
function slug(s){
  return String(s).toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g,'').replace(/[^a-z0-9]+/g,'-').replace(/(^-|-$)/g,'');
}
function esc(s){
  return String(s==null?'':s).replace(/[&<>"']/g, function(c){
    return {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c];
  });
}
function uid(){ return Date.now().toString(36) + Math.random().toString(36).slice(2,8); }
function hexToRgb(hex){
  hex = hex.replace('#','');
  if(hex.length===3) hex = hex.split('').map(function(c){return c+c;}).join('');
  var n = parseInt(hex,16);
  return [(n>>16)&255,(n>>8)&255,n&255];
}
function rgbToHex(rgb){
  return '#'+rgb.map(function(v){ v=Math.max(0,Math.min(255,Math.round(v))); var h=v.toString(16); return h.length===1?'0'+h:h; }).join('');
}
function lerpColor(stops, t){
  t = Math.max(0,Math.min(1,t));
  var n = stops.length-1;
  var seg = t*n;
  var i = Math.min(n-1, Math.floor(seg));
  var localT = seg - i;
  var a = hexToRgb(stops[i]), b = hexToRgb(stops[i+1]);
  var mix = [a[0]+(b[0]-a[0])*localT, a[1]+(b[1]-a[1])*localT, a[2]+(b[2]-a[2])*localT];
  return rgbToHex(mix);
}
function initials(name){
  var parts = String(name).trim().split(/\s+/);
  return ((parts[0]||'')[0]||'') + ((parts[1]||'')[0]||'');
}

/* ================= SAMPLE DATA GENERATION ================= */
function genStats(r, posCat){
  var tdp=0, pts=0, intc=0;
  if(posCat==='QB'){ tdp=randInt(r,4,24); pts=randInt(r,0,12); intc=randInt(r,0,6); }
  else if(posCat==='OFF'){ pts=randInt(r,6,84); }
  else { pts=randInt(r,0,12); intc=randInt(r,0,9); }
  return {tdp:tdp, pts:pts, intc:intc};
}
function posCategory(pos){
  if(pos==='QB') return 'QB';
  if(pos==='WR'||pos==='RB'||pos==='C'||pos==='FLEX') return 'OFF';
  return 'DEF';
}
function teamBlurb(r,name,barrio,catName){
  var t = [
    'Representando con orgullo a la zona de '+barrio+', los '+name+' compiten en la categoría '+catName+' de la Liga Flag Mazatlán.',
    'Con raíces en '+barrio+', los '+name+' llegan a la temporada con la mira puesta en el campeonato de '+catName+'.',
    'Los '+name+', originarios de '+barrio+', son uno de los equipos más seguidos de la categoría '+catName+'.'
  ];
  return pick(r,t);
}
function playerBlurb(r, fullName, posLabel, teamName){
  var t = [
    fullName+' es pieza clave de '+teamName+' en la posición de '+posLabel+'.',
    'Conocido por su disciplina dentro del campo, '+fullName+' juega como '+posLabel+' para '+teamName+'.',
    fullName+' aporta experiencia y velocidad a '+teamName+' desde la posición de '+posLabel+'.'
  ];
  return pick(r,t);
}
function generatePlayer(r, team, catDef, slotIndex, usedNumbers){
  var isFemale = /Femenil/.test(catDef.name) || (/Mixto/.test(catDef.name) && r() > 0.5);
  var first = isFemale ? pick(r,FIRST_F) : pick(r,FIRST_M);
  var last1 = pick(r,LAST), last2 = pick(r,LAST);
  var fullName = first+' '+last1+' '+last2;
  var pos = slotIndex===0 ? 'QB' : pick(r,POSITIONS);
  var num;
  do { num = randInt(r,1,89); } while(usedNumbers.has(num));
  usedNumbers.add(num);
  var stats = genStats(r, posCategory(pos));
  var id = team.id+'-p'+slotIndex+'-'+slug(fullName);
  return {
    id: id, name: fullName, number: num, position: pos, photo: '',
    blurb: playerBlurb(r, fullName, POSITION_LABELS[pos], team.name),
    stats: stats
  };
}
function generateTeam(r, catDef, ci, accentColor, mascot, barrio, colors){
  var name = mascot+' '+barrio;
  var id = slug(name+'-'+ci+'-'+randInt(r,100,999));
  var wins = randInt(r,1,9);
  var losses = randInt(r,0,9-Math.min(wins,9));
  var coach = pick(r, r()>0.5?FIRST_M:FIRST_F)+' '+pick(r,LAST);
  var team = {
    id:id, name:name, coach:coach, wins:wins, losses:losses,
    colorPrimary:colors[0], colorSecondary:colors[1], cover:'',
    blurb:'', players:[]
  };
  team.blurb = teamBlurb(r, name, barrio, catDef.name);
  var usedNumbers = new Set();
  for(var p=0;p<13;p++){
    team.players.push(generatePlayer(r, team, catDef, p, usedNumbers));
  }
  return team;
}
function makeTeam(id, name, c1, c2){
  return {id:id, name:name, coach:'', wins:0, losses:0, colorPrimary:c1, colorSecondary:c2, cover:'', blurb:'', players:[]};

function rebuildIndex(){
  IDX = {teams:{}, players:{}, search:[]};
  DATA.categories.forEach(function(cat){
    cat.teams.forEach(function(team){
      IDX.teams[team.id] = {team:team, cat:cat};
      IDX.search.push({type:'team', id:team.id, name:team.name, sub:cat.name});
      team.players.forEach(function(pl){
        IDX.players[pl.id] = {player:pl, team:team, cat:cat};
        IDX.search.push({type:'player', id:pl.id, name:pl.name, sub:team.name+' · #'+pl.number});
      });
    });
  });
}
function findTeam(id){ return IDX.teams[id]; }

/* ================= STORAGE ================= */
async function loadData(){
  try{
    var res = await window.storage.get(STORAGE_KEY, true);
    if(res && res.value){
      var parsed = JSON.parse(res.value);
      if(parsed && parsed.categories && parsed.categories.length){
        if(!parsed.champions) parsed.champions = [];
        if(!parsed.seasonStart) parsed.seasonStart = '2026-07-25';
        if(!parsed.season || parsed.season==='Temporada 2026') parsed.season = 'Verano 2026';
        return parsed;
      }
    }
    throw new Error('empty');
  }catch(e){
    var fresh = generateLeague();
    try{ await window.storage.set(STORAGE_KEY, JSON.stringify(fresh), true); }catch(e2){}
    return fresh;
  }
}
async function persist(){
  DATA.updatedAt = Date.now();
  rebuildIndex();
  try{
    var ok = await window.storage.set(STORAGE_KEY, JSON.stringify(DATA), true);
    if(!ok) toast('No se pudo guardar. Intenta de nuevo.');
  }catch(e){
    toast('No se pudo guardar. Revisa tu conexión.');
  }
}

/* ================= TOAST ================= */
function toast(msg){
  var el = document.getElementById('toast');
  el.textContent = msg;
  el.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(function(){ el.classList.remove('show'); }, 2200);
}

function render(){
  var parts = currentRoute();
  var root = document.getElementById('app');
  var html = '';
  if(parts.length===0){
    html = renderHome();
  } else if(parts[0]==='categorias'){
    html = renderCategories();
  } else if(parts[0]==='categoria' && parts[1]){
    html = renderCategory(parts[1]);
  } else if(parts[0]==='equipo' && parts[1]){
    html = renderTeam(parts[1]);
  } else if(parts[0]==='jugador' && parts[1]){
    html = renderPlayer(parts[1]);
  } else if(parts[0]==='buscar'){
    html = renderSearch();
  } else if(parts[0]==='rankings'){
    html = renderRankings();
  } else if(parts[0]==='campeones'){
    html = renderChampions();
  } else {
    html = renderHome();
  }
  root.innerHTML = '<div class="brand-strip"></div>' + html;
  afterRender(parts);
}

function countdownHtml(){
  if(!DATA.seasonStart) return '';
  var start = new Date(DATA.seasonStart + 'T00:00:00');
  var now = new Date();
  var diff = start - now;
  var dateStr = start.toLocaleDateString('es-MX',{day:'numeric',month:'long',year:'numeric'});
  var inner = '';
  if(diff <= 0){
    inner = '<div class="cd-started">🏈 ¡La temporada ya comenzó! Arrancó el '+dateStr+'</div>';
  } else {
    var d = Math.floor(diff/86400000);
    var h = Math.floor((diff%86400000)/3600000);
    var m = Math.floor((diff%3600000)/60000);
    inner = '<div class="season-banner-label">Inicio · '+dateStr+'</div>'+
      '<div class="season-banner-title">'+esc(DATA.season)+' arranca en</div>'+
      '<div class="countdown-row">'+
        '<div class="cd-box"><b id="cd-d">'+d+'</b><span>Días</span></div>'+
        '<div class="cd-box"><b id="cd-h">'+h+'</b><span>Horas</span></div>'+
        '<div class="cd-box"><b id="cd-m">'+m+'</b><span>Min</span></div>'+
      '</div>';
  }
  return '<div class="season-banner">'+
    '<div class="season-banner-icon">🌴</div>'+
    '<div class="season-banner-body">'+inner+'</div>'+
  '</div>';
}

      var h  = Math.floor((diff%86400000)/3600000);

  var cat = DATA.categories.find(function(c){ return c.id===catId; });

  var grid = cat.teams.map(function(t){ return teamCardHtml(t, cat); }).join('');
  if(ADMIN){
    grid += '<div class="team-card add-card" data-action="add-team" data-cat="'+cat.id+'">'+ICONS.plus+'<span>Agregar equipo</span></div>';
  } else if(!cat.teams.length){

      '<p>Próximamente los equipos de <b>'+esc(cat.name)+'</b> se registrarán para el Verano 2026. ¡Pendiente!</p></div>';
  }
  return topbarHtml(cat.name, {showBack:true, sub: cat.sub}) +
  '<div class="content">'+
    adminBannerHtml()+
    '<div class="row-between"><h2 class="section-title">Equipos</h2>'+(ADMIN?'<button class="pencil-btn" data-action="edit-category" data-id="'+cat.id+'">'+ICONS.pencil+'</button>':'')+'</div>'+

  navHtml('cat');
}

function rankRowHtml(rank, route, title, sub, value, unit){
  var rc = rank===1?'top1':rank===2?'top2':rank===3?'top3':'';
  return '<a class="rank-row" data-route="'+route+'">'+
    '<div class="rank-num '+rc+'">'+rank+'</div>'+
    '<div class="rank-info"><h4>'+esc(title)+'</h4><span>'+esc(sub)+'</span></div>'+
    '<div class="rank-value">'+value+'<small>'+unit+'</small></div>'+
  '</a>';
}
function emptyRankHtml(){
  return '<div class="empty-state">'+ICONS.empty+'<p>No hay datos suficientes para este ranking.</p></div>';
}
function buildRankingListHtml(){
  return rankState.tab==='players' ? buildPlayerRankingHtml() : buildTeamRankingHtml();
}
function buildPlayerRankingHtml(){
  var statDef = STAT_DEFS.filter(function(s){ return s.key===rankState.stat; })[0] || STAT_DEFS[0];
  var list = Object.keys(IDX.players).map(function(k){ return IDX.players[k]; });
  if(rankState.catFilter!=='all') list = list.filter(function(x){ return x.cat.id===rankState.catFilter; });
  list.sort(function(a,b){ return b.player.stats[statDef.key]-a.player.stats[statDef.key]; });
  list = list.slice(0,25);
  if(!list.length) return emptyRankHtml();
  return list.map(function(x,i){
    return rankRowHtml(i+1, '#/jugador/'+x.player.id, x.player.name, x.team.name+' · '+x.cat.name, x.player.stats[statDef.key], statDef.short);
  }).join('');
}
function buildTeamRankingHtml(){
  var list = Object.keys(IDX.teams).map(function(k){ return IDX.teams[k]; });
  if(rankState.catFilter!=='all') list = list.filter(function(x){ return x.cat.id===rankState.catFilter; });
  list.sort(function(a,b){
    var pa = a.team.wins/Math.max(1,(a.team.wins+a.team.losses));
    var pb = b.team.wins/Math.max(1,(b.team.wins+b.team.losses));
    if(pb!==pa) return pb-pa;
    return b.team.wins-a.team.wins;
  });
  list = list.slice(0,25);
  if(!list.length) return emptyRankHtml();
  return list.map(function(x,i){
    var pct = Math.round((x.team.wins/Math.max(1,(x.team.wins+x.team.losses)))*100);
    return rankRowHtml(i+1, '#/equipo/'+x.team.id, x.team.name, x.cat.name+' · '+x.team.wins+'-'+x.team.losses, pct+'%', 'Efectividad');
  }).join('');
}

function seasonYear(season){
  var m = String(season||'').match(/\d{4}/);
  return m ? parseInt(m[0],10) : 0;
}
function champRowHtml(c){
  var sub = [c.season];
  if(c.runnerUp) sub.push('vs '+c.runnerUp);
  if(c.score) sub.push(c.score);
  return '<div class="champ-row">'+
    '<div class="champ-icon">'+ICONS.crown+'</div>'+
    '<div class="champ-info"><h4>'+esc(c.team)+'</h4><span>'+sub.map(esc).join(' · ')+'</span></div>'+
    (ADMIN ? '<button class="pencil-btn" data-action="edit-champion" data-id="'+c.id+'">'+ICONS.pencil+'</button>' : '')+
  '</div>';
}
function emptyChampHtml(){
  return '<div class="empty-state">'+ICONS.empty+'<p>Aún no hay campeones registrados'+(ADMIN?'. Usa el botón de arriba para agregar el primero.':' para esta categoría.')+'</p></div>';
}
function buildChampionsListHtml(){
  var all = DATA.champions || [];
  if(champState.catFilter==='all'){
    var groups = DATA.categories.map(function(cat){
      var entries = all.filter(function(c){ return c.catId===cat.id; }).sort(function(a,b){ return seasonYear(b.season)-seasonYear(a.season); });
      if(!entries.length) return '';
      return '<p class="eyebrow" style="margin-top:18px;display:flex;align-items:center;gap:7px"><span style="width:9px;height:9px;border-radius:3px;background:'+cat.accent+';display:inline-block"></span>'+esc(cat.name)+'</p>' + entries.map(champRowHtml).join('');
    }).join('');
    if(!groups.trim()) return emptyChampHtml();
    return groups;
  }
  var list = all.filter(function(c){ return c.catId===champState.catFilter; }).sort(function(a,b){ return seasonYear(b.season)-seasonYear(a.season); });
  if(!list.length) return emptyChampHtml();
  return list.map(champRowHtml).join('');
}
function championFormFields(c){
  var catOptions = DATA.categories.map(function(cat){ return '<option value="'+cat.id+'"'+(c.catId===cat.id?' selected':'')+'>'+esc(cat.name)+'</option>'; }).join('');
  return '<div class="field"><label>Categoría</label><select id="f-cat">'+catOptions+'</select></div>'+
    '<div class="field"><label>Temporada</label><input id="f-season" value="'+esc(c.season)+'" placeholder="Ej. Apertura 2025"></div>'+
    '<div class="field"><label>Equipo campeón</label><input id="f-team" value="'+esc(c.team)+'"></div>'+
    '<div class="field"><label>Subcampeón (opcional)</label><input id="f-runner" value="'+esc(c.runnerUp||'')+'"></div>'+
    '<div class="field"><label>Marcador (opcional)</label><input id="f-score" value="'+esc(c.score||'')+'" placeholder="Ej. 21-14"></div>';
}
function readChampionForm(c){
  c.catId = document.getElementById('f-cat').value;
  c.season = document.getElementById('f-season').value.trim();
  c.team = document.getElementById('f-team').value.trim();
  c.runnerUp = document.getElementById('f-runner').value.trim();
  c.score = document.getElementById('f-score').value.trim();
}
function showAddChampionModal(){
  var defaultCat = champState.catFilter!=='all' ? champState.catFilter : (DATA.categories[0] && DATA.categories[0].id);
  var blank = {catId: defaultCat, season:'', team:'', runnerUp:'', score:''};
  openModalHtml(
    '<h3>Agregar campeón</h3>'+championFormFields(blank)+
    '<div class="modal-actions"><button class="btn btn-secondary" data-action="modal-close">Cancelar</button><button class="btn btn-primary" id="btn-save">Guardar</button></div>'
  );
  document.getElementById('btn-save').onclick = async function(){
    readChampionForm(blank);
    if(!blank.season || !blank.team){ toast('Completa temporada y equipo'); return; }
    blank.id = uid();
    DATA.champions.push(blank);
    closeModal(); await persist(); render(); toast('Campeón agregado');
  };
}
function showEditChampionModal(champId){
  var c = (DATA.champions||[]).filter(function(x){ return x.id===champId; })[0];
  if(!c) return;
  openModalHtml(
    '<h3>Editar campeón</h3>'+championFormFields(c)+
    '<div class="modal-actions"><button class="btn btn-danger" id="btn-del">Eliminar registro</button></div>'+
    '<div class="modal-actions"><button class="btn btn-secondary" data-action="modal-close">Cancelar</button><button class="btn btn-primary" id="btn-save">Guardar</button></div>'
  );
  document.getElementById('btn-save').onclick = async function(){
    readChampionForm(c);
    closeModal(); await persist(); render(); toast('Campeón actualizado');
  };
  document.getElementById('btn-del').onclick = async function(){
    if(!confirm('¿Eliminar este registro de campeón?')) return;
    DATA.champions = DATA.champions.filter(function(x){ return x.id!==champId; });
    closeModal(); await persist(); render(); toast('Registro eliminado');
  };
}

function renderSearch(){
  return topbarHtml('Buscar', {showBack:false}) +
  '<div class="content">'+
    adminBannerHtml()+
    '<div class="search-box"><input id="search-input" placeholder="Nombre de equipo o jugador…" autocomplete="off"></div>'+
    '<div id="search-results"><div class="empty-state">'+ICONS.empty+'<p>Escribe para buscar entre '+totalCounts().teams+' equipos y '+totalCounts().players+' jugadores.</p></div></div>'+
  '</div>'+
  navHtml('search');
}
function searchResultsHtml(query){
  query = query.trim().toLowerCase();
  if(!query){
    return '<div class="empty-state">'+ICONS.empty+'<p>Escribe para buscar entre '+totalCounts().teams+' equipos y '+totalCounts().players+' jugadores.</p></div>';
  }
  var matches = IDX.search.filter(function(r){ return r.name.toLowerCase().indexOf(query)!==-1; }).slice(0,40);
  if(!matches.length){
    return '<div class="empty-state">'+ICONS.empty+'<p>Sin resultados para "'+esc(query)+'".</p></div>';
  }
  return matches.map(function(r){
    var route = r.type==='team' ? '#/equipo/'+r.id : '#/jugador/'+r.id;
    return '<a class="result-row" data-route="'+route+'">'+
      '<div class="result-icon">'+(r.type==='team'?ICONS.shield:ICONS.user)+'</div>'+
      '<div><h4>'+esc(r.name)+'</h4><span>'+esc(r.sub)+'</span></div>'+
    '</a>';
  }).join('');
}

function notFoundHtml(msg, back){
  return topbarHtml('Flag Mazatlán', {showBack:true}) +
  '<div class="content"><div class="empty-state">'+ICONS.empty+'<p>'+esc(msg)+'</p></div></div>'+
  navHtml('home');
}

/* ================= AFTER RENDER ================= */
function afterRender(parts){
  if(parts[0]==='buscar'){
    var input = document.getElementById('search-input');
    if(input){
      input.addEventListener('input', function(){
        document.getElementById('search-results').innerHTML = searchResultsHtml(input.value);
      });
      setTimeout(function(){ input.focus(); }, 50);
    }
  }
  if(parts[0]==='rankings'){
    var sel = document.getElementById('rank-cat-filter');
    if(sel){
      sel.addEventListener('change', function(){
        rankState.catFilter = sel.value;
        render();
      });
    }
  }
  if(parts[0]==='campeones'){
    var selC = document.getElementById('champ-cat-filter');
    if(selC){
      selC.addEventListener('change', function(){
        champState.catFilter = selC.value;
        render();
      });
    }
  }
}

/* ================= EVENT DELEGATION ================= */
document.addEventListener('click', function(e){
  var target = e.target.closest('[data-route],[data-action]');
  if(!target) return;
  e.preventDefault();
  if(target.hasAttribute('data-action')){
    handleAction(target.getAttribute('data-action'), target.dataset);
  } else {
    navigate(target.getAttribute('data-route'));
  }
});

function handleAction(action, ds){
  if(action==='back'){ history.back(); return; }
  if(action==='admin-toggle'){
    if(ADMIN){ ADMIN=false; render(); toast('Modo admin desactivado'); }
    else { showPinModal(); }
    return;
  }
  if(action==='modal-close'){ closeModal(); return; }
  if(action==='edit-category'){ showEditCategoryModal(ds.id); return; }
  if(action==='edit-team'){ showEditTeamModal(ds.id); return; }
  if(action==='add-team'){ showAddTeamModal(ds.cat); return; }
  if(action==='edit-player'){ showEditPlayerModal(ds.id); return; }
  if(action==='add-player'){ showAddPlayerModal(ds.team); return; }
  if(action==='rank-tab'){ rankState.tab = ds.tab; render(); return; }
  if(action==='rank-stat'){ rankState.stat = ds.stat; render(); return; }
  if(action==='add-champion'){ showAddChampionModal(); return; }
  if(action==='edit-champion'){ showEditChampionModal(ds.id); return; }
  if(action==='lb'){ if(ds.lb) openLightbox(ds.lb); return; }
}

/* ================= MODAL SYSTEM ================= */
var modalRoot = null;
function openModalHtml(html){
  modalRoot.innerHTML = '<div class="modal-backdrop" data-action="modal-close"><div class="modal-card" id="modal-card"></div></div>';
  modalRoot.classList.add('open');
  document.getElementById('modal-card').innerHTML = html;
  document.getElementById('modal-card').addEventListener('click', function(e){ e.stopPropagation(); });
}
function closeModal(){ modalRoot.classList.remove('open'); modalRoot.innerHTML=''; }

function showPinModal(){
  openModalHtml(
    '<h3>Acceso de administrador</h3>'+
    '<p class="field-hint" style="margin-bottom:14px">Ingresa el PIN para editar la información de la liga.</p>'+
    '<div class="field"><label>PIN</label><input id="pin-input" type="password" inputmode="numeric" placeholder="••••" maxlength="8"></div>'+
    '<div class="modal-actions"><button class="btn btn-secondary" data-action="modal-close">Cancelar</button><button class="btn btn-primary" id="pin-submit">Entrar</button></div>'
  );
  var input = document.getElementById('pin-input');
  setTimeout(function(){ input.focus(); }, 50);
  function trySubmit(){
    if(input.value === ADMIN_PIN){
      ADMIN = true; closeModal(); render(); toast('Modo admin activado');
    } else {
      toast('PIN incorrecto');
      input.value=''; input.focus();
    }
  }
  document.getElementById('pin-submit').onclick = trySubmit;
  input.addEventListener('keydown', function(e){ if(e.key==='Enter') trySubmit(); });
}

function showEditCategoryModal(catId){
  var cat = DATA.categories.find(function(c){ return c.id===catId; });
  if(!cat) return;
  openModalHtml(
    '<h3>Editar categoría</h3>'+
    '<div class="field"><label>Nombre</label><input id="f-name" value="'+esc(cat.name)+'"></div>'+
    '<div class="field"><label>Descripción</label><input id="f-sub" value="'+esc(cat.sub)+'"></div>'+
    '<div class="modal-actions"><button class="btn btn-secondary" data-action="modal-close">Cancelar</button><button class="btn btn-primary" id="btn-save">Guardar</button></div>'
  );
  document.getElementById('btn-save').onclick = async function(){
    var n = document.getElementById('f-name').value.trim();
    var s = document.getElementById('f-sub').value.trim();
    if(n) cat.name = n;
    cat.sub = s;
    closeModal(); await persist(); render(); toast('Categoría actualizada');
  };
}

function teamFormFields(team){
  return '<div class="field"><label>Nombre del equipo</label><input id="f-name" value="'+esc(team.name)+'"></div>'+
    '<div class="field"><label>Entrenador (DT)</label><input id="f-coach" value="'+esc(team.coach)+'"></div>'+
    '<div class="field-row">'+
      '<div class="field"><label>Victorias</label><input id="f-wins" type="number" min="0" value="'+team.wins+'"></div>'+
      '<div class="field"><label>Derrotas</label><input id="f-losses" type="number" min="0" value="'+team.losses+'"></div>'+
    '</div>'+
    '<div class="field-row">'+
      '<div class="field"><label>Color primario</label><input id="f-c1" type="color" value="'+team.colorPrimary+'"></div>'+
      '<div class="field"><label>Color secundario</label><input id="f-c2" type="color" value="'+team.colorSecondary+'"></div>'+
    '</div>'+
    '<div class="field"><label>Foto de portada (URL)</label><input id="f-cover" value="'+esc(team.cover)+'" placeholder="https://…">'+
    '<div class="field-hint">Pega un link de imagen (Imgur, Google Drive público, etc.)</div></div>'+
    '<div class="field"><label>Descripción del equipo</label><textarea id="f-blurb">'+esc(team.blurb)+'</textarea></div>';
}
function readTeamForm(team){
  team.name = document.getElementById('f-name').value.trim() || team.name;
  team.coach = document.getElementById('f-coach').value.trim();
  team.wins = Math.max(0, parseInt(document.getElementById('f-wins').value,10) || 0);
  team.losses = Math.max(0, parseInt(document.getElementById('f-losses').value,10) || 0);
  team.colorPrimary = document.getElementById('f-c1').value;
  team.colorSecondary = document.getElementById('f-c2').value;
  team.cover = document.getElementById('f-cover').value.trim();
  team.blurb = document.getElementById('f-blurb').value.trim();
}
function showEditTeamModal(teamId){
  var found = findTeam(teamId);
  if(!found) return;
  var team = found.team, cat = found.cat;
  openModalHtml(
    '<h3>Editar equipo</h3>'+
    teamFormFields(team)+
    '<div class="modal-actions"><button class="btn btn-danger" id="btn-del">Eliminar equipo</button></div>'+
    '<div class="modal-actions"><button class="btn btn-secondary" data-action="modal-close">Cancelar</button><button class="btn btn-primary" id="btn-save">Guardar</button></div>'
  );
  document.getElementById('btn-save').onclick = async function(){
    readTeamForm(team);
    closeModal(); await persist(); render(); toast('Equipo actualizado');
  };
  document.getElementById('btn-del').onclick = async function(){
    if(!confirm('¿Eliminar "'+team.name+'" y sus '+team.players.length+' jugadores? Esta acción no se puede deshacer.')) return;
    cat.teams = cat.teams.filter(function(t){ return t.id!==team.id; });
    closeModal(); await persist(); navigate('#/categoria/'+cat.id); toast('Equipo eliminado');
  };
}
function showAddTeamModal(catId){
  var cat = DATA.categories.find(function(c){ return c.id===catId; });
  if(!cat) return;
  var blank = {name:'', coach:'', wins:0, losses:0, colorPrimary:'#1B5E42', colorSecondary:'#FFC93C', cover:'', blurb:''};
  openModalHtml(
    '<h3>Agregar equipo</h3>'+
    teamFormFields(blank)+
    '<div class="modal-actions"><button class="btn btn-secondary" data-action="modal-close">Cancelar</button><button class="btn btn-primary" id="btn-save">Crear equipo</button></div>'
  );
  document.getElementById('btn-save').onclick = async function(){
    readTeamForm(blank);
    if(!blank.name){ toast('Ponle un nombre al equipo'); return; }
    blank.id = slug(blank.name)+'-'+uid();
    blank.players = [];
    cat.teams.push(blank);
    closeModal(); await persist(); navigate('#/equipo/'+blank.id); toast('Equipo creado');
  };
}

function playerFormFields(p){
  var posOptions = POSITIONS.map(function(pos){
    return '<option value="'+pos+'"'+(p.position===pos?' selected':'')+'>'+POSITION_LABELS[pos]+'</option>';
  }).join('');
  var s = p.stats;
  return '<div class="field"><label>Nombre</label><input id="f-name" value="'+esc(p.name)+'"></div>'+
    '<div class="field-row">'+
      '<div class="field"><label>Número</label><input id="f-num" type="number" min="0" max="99" value="'+p.number+'"></div>'+
      '<div class="field"><label>Posición</label><select id="f-pos">'+posOptions+'</select></div>'+
    '</div>'+
    '<div class="field"><label>Foto (URL)</label><input id="f-photo" value="'+esc(p.photo)+'" placeholder="https://…"></div>'+
    '<p class="eyebrow" style="margin-top:14px">Estadísticas</p>'+
    '<div class="stat-fields">'+
      '<div class="field"><label>Pases TD</label><input id="f-tdp" type="number" min="0" value="'+s.tdp+'"></div>'+
      '<div class="field"><label>Puntos</label><input id="f-pts" type="number" min="0" value="'+s.pts+'"></div>'+
      '<div class="field"><label>Intercep.</label><input id="f-intc" type="number" min="0" value="'+s.intc+'"></div>'+
    '</div>'+
    '<div class="field"><label>Descripción</label><textarea id="f-blurb">'+esc(p.blurb)+'</textarea></div>';
}
function readPlayerForm(p){
  p.name = document.getElementById('f-name').value.trim() || p.name;
  p.number = Math.max(0, parseInt(document.getElementById('f-num').value,10) || 0);
  p.position = document.getElementById('f-pos').value;
  p.photo = document.getElementById('f-photo').value.trim();
  p.blurb = document.getElementById('f-blurb').value.trim();
  p.stats = {
    tdp: Math.max(0, parseInt(document.getElementById('f-tdp').value,10)||0),
    pts: Math.max(0, parseInt(document.getElementById('f-pts').value,10)||0),
    intc: Math.max(0, parseInt(document.getElementById('f-intc').value,10)||0)
  };
}
function showEditPlayerModal(playerId){
  var found = findPlayer(playerId);
  if(!found) return;
  var p = found.player, team = found.team;
  openModalHtml(
    '<h3>Editar jugador</h3>'+
    playerFormFields(p)+
    '<div class="modal-actions"><button class="btn btn-danger" id="btn-del">Eliminar jugador</button></div>'+
    '<div class="modal-actions"><button class="btn btn-secondary" data-action="modal-close">Cancelar</button><button class="btn btn-primary" id="btn-save">Guardar</button></div>'
  );
  document.getElementById('btn-save').onclick = async function(){
    readPlayerForm(p);
    closeModal(); await persist(); render(); toast('Jugador actualizado');
  };
  document.getElementById('btn-del').onclick = async function(){
    if(!confirm('¿Eliminar a "'+p.name+'" del roster?')) return;
    team.players = team.players.filter(function(pl){ return pl.id!==p.id; });
    closeModal(); await persist(); navigate('#/equipo/'+team.id); toast('Jugador eliminado');
  };
}
function showAddPlayerModal(teamId){
  var found = findTeam(teamId);
  if(!found) return;
  var team = found.team;
  var blank = {name:'', number:0, position:'WR', photo:'', blurb:'', stats:{tdp:0,pts:0,intc:0}};
  openModalHtml(
    '<h3>Agregar jugador</h3>'+
    playerFormFields(blank)+
    '<div class="modal-actions"><button class="btn btn-secondary" data-action="modal-close">Cancelar</button><button class="btn btn-primary" id="btn-save">Agregar</button></div>'
  );
  document.getElementById('btn-save').onclick = async function(){
    readPlayerForm(blank);
    if(!blank.name){ toast('Ponle un nombre al jugador'); return; }
    blank.id = team.id+'-p'+uid();
    team.players.push(blank);
    closeModal(); await persist(); navigate('#/equipo/'+team.id); toast('Jugador agregado');
  };
}

/* ================= LIGHTBOX ================= */
function openLightbox(src){
  var lb = document.getElementById('lightbox');
  var img = document.getElementById('lb-img');
  img.src = src;
  lb.classList.add('open');
}
function closeLightbox(){
  var lb = document.getElementById('lightbox');
  lb.classList.remove('open');
  document.getElementById('lb-img').src = '';
}

/* ================= INIT ================= */
(async function init(){
  modalRoot = document.getElementById('modal-root');
  // Lightbox
  document.getElementById('lb-close').addEventListener('click', closeLightbox);
  document.getElementById('lightbox').addEventListener('click', function(e){ if(e.target===this||e.target===document.getElementById('lb-img')) closeLightbox(); });
  document.addEventListener('keydown', function(e){ if(e.key==='Escape') closeLightbox(); });
  var ll = document.getElementById('loading-logo');
  if(ll && typeof LOGO_SRC !== 'undefined') ll.src = LOGO_SRC;
  DATA = await loadData();
  rebuildIndex();
  render();
})();

})();
</script>
